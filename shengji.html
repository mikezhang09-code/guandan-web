<script src="voices.js"></script>
<script>
/* ============================ 声音合成器 ============================ */
const Sound = {
  ctx: null,
  muted: false,
  init() {
    if (!this.ctx) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (AudioContextClass) {
        this.ctx = new AudioContextClass();
      }
      this.muted = localStorage.getItem('game_sound_muted') === 'true';
      this.updateToggleButton();
    }
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },
  toggleMute() {
    this.init();
    this.muted = !this.muted;
    if (this.muted && this._stopVoice) this._stopVoice();
    localStorage.setItem('game_sound_muted', this.muted);
    this.updateToggleButton();
    return this.muted;
  },
  updateToggleButton() {
    const btn = document.getElementById('sound-toggle');
    if (btn) {
      btn.textContent = this.muted ? '🔇' : '🔊';
    }
  },
  dealSequence() {
    this.init();
    if (this.muted || !this.ctx) return;
    for (let i = 0; i < 6; i++) {
      setTimeout(() => this.play('deal'), i * 60);
    }
  },
  play(type) {
    this.init();
    if (this.muted || !this.ctx) return;
    const now = this.ctx.currentTime;
    try {
      switch(type) {
        case 'click': {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.exponentialRampToValueAtTime(150, now + 0.08);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
          osc.start(now);
          osc.stop(now + 0.08);
          break;
        }
        case 'play': {
          const bufferSize = this.ctx.sampleRate * 0.12;
          const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
          const noise = this.ctx.createBufferSource();
          noise.buffer = buffer;
          const filter = this.ctx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(1000, now);
          filter.frequency.exponentialRampToValueAtTime(150, now + 0.12);
          const noiseGain = this.ctx.createGain();
          noiseGain.gain.setValueAtTime(0.12, now);
          noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
          noise.connect(filter);
          filter.connect(noiseGain);
          noiseGain.connect(this.ctx.destination);
          noise.start(now);
          // 已移除原先的低频 boom(咚)，只保留轻柔的拍牌声
          break;
        }
        case 'pass': {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(250, now);
          osc.frequency.linearRampToValueAtTime(180, now + 0.15);
          gain.gain.setValueAtTime(0.06, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          osc.start(now);
          osc.stop(now + 0.15);
          break;
        }
        case 'deal': {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.exponentialRampToValueAtTime(300, now + 0.04);
          gain.gain.setValueAtTime(0.03, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
          osc.start(now);
          osc.stop(now + 0.04);
          break;
        }
        case 'win': {
          const notes = [261.63, 329.63, 392.00, 523.25];
          notes.forEach((freq, idx) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + idx * 0.05);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.06, now + idx * 0.05 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.05 + 0.3);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(now + idx * 0.05);
            osc.stop(now + idx * 0.05 + 0.3);
          });
          break;
        }
        case 'warn': {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(130, now);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          osc.start(now);
          osc.stop(now + 0.15);
          break;
        }
        case 'victory': {
          const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
          notes.forEach((freq, idx) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + idx * 0.1);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.08, now + idx * 0.1 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.1 + 0.4);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(now + idx * 0.1);
            osc.stop(now + idx * 0.1 + 0.4);
          });
          break;
        }
        case 'defeat': {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(220, now);
          osc.frequency.linearRampToValueAtTime(110, now + 0.6);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.linearRampToValueAtTime(0.08, now + 0.3);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
          osc.start(now);
          osc.stop(now + 0.6);
          break;
        }
      }
    } catch (e) {
      console.warn("Web Audio API error:", e);
    }
  },
  // text 可为字符串或字符串数组(数组会按顺序连续播放)
  speak(text, seatIndex = 0) {
    this.init();
    if (this.muted) return;
    const parts = (Array.isArray(text) ? text : [text]).filter(Boolean);
    // 优先使用百度 TTS 预生成的真人语音(voices.js + voices/ 目录)
    if (window.VOICE_PHRASES) {
      const clips = parts.map(t => this._voiceFile(t, seatIndex)).filter(Boolean);
      if (!clips.length) return;
      // 当前还在播报时不打断(否则会"说了一半就没了")，把新的一条排在其后；
      // 只保留最近一条待播，避免语音越积越落后于牌面
      if (this._curVoice && !this._curVoice.ended) {
        this._pending = clips;
        return;
      }
      this._voiceQueue = clips;
      this._playNextVoice();
      return;
    }
    // 回退: 浏览器合成语音(尚未生成 voices 时)
    this._speakFallback(parts.join('，'), seatIndex);
  },
  _voiceFile(text, seat) {
    const i = window.VOICE_PHRASES.indexOf(text);
    if (i < 0) return null;
    return `${window.VOICE_BASE || 'voices/'}${seat % 4}/${i}.mp3`;
  },
  _playNextVoice() {
    if (this._voiceQueue && this._voiceQueue.length) {
      const url = this._voiceQueue.shift();
      const a = new Audio(url);
      a.playbackRate = 1.35;   // 预录制的语音念得比较慢, 提速播放更跟得上牌局节奏
      this._curVoice = a;
      const next = () => { if (this._curVoice === a) this._playNextVoice(); };
      a.onended = next;
      a.onerror = next;
      a.play().catch(() => {});
      return;
    }
    // 当前序列播完，若有待播的最新一条则接着播
    this._curVoice = null;
    if (this._pending) { this._voiceQueue = this._pending; this._pending = null; this._playNextVoice(); }
  },
  _stopVoice() {
    if (this._curVoice) { try { this._curVoice.pause(); } catch (e) {} }
    this._curVoice = null;
    this._voiceQueue = [];
    this._pending = null;
  },
  _speakFallback(text, seatIndex) {
    if (!window.speechSynthesis) return;
    try {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      const rates = [1.15, 1.25, 1.1, 1.2];
      const pitches = [1.05, 0.95, 1.15, 0.9];
      utterance.rate = rates[seatIndex % 4];
      utterance.pitch = pitches[seatIndex % 4];
      const voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('zh'));
      if (voices.length > 0) utterance.voice = voices[seatIndex % voices.length];
      window.speechSynthesis.speak(utterance);
    } catch (e) {
      console.warn("Speech synthesis error:", e);
    }
  }
};
if (typeof window !== 'undefined' && window.speechSynthesis) {
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = () => {};
  }
}
window.addEventListener('click', () => Sound.init(), { once: true });
window.addEventListener('touchstart', () => Sound.init(), { once: true });

/* ===== 基础 ===== */
const SUITS=['S','H','C','D'], SUIT_SYM={S:'♠',H:'♥',C:'♣',D:'♦'}, RED=new Set(['H','D']);
const SUIT_NAME={S:'黑桃',H:'红桃',C:'梅花',D:'方块',NT:'无主'};
const NAMES=['你','左家','对家','右家'];
const team=i=>i%2;
let uid=0;
function makeDeck(){ const d=[]; for(let k=0;k<2;k++){
  for(const s of SUITS) for(let r=2;r<=14;r++) d.push({id:uid++,suit:s,rank:r,joker:null});
  d.push({id:uid++,suit:'J',rank:null,joker:'S'}); d.push({id:uid++,suit:'J',rank:null,joker:'B'}); } return d; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function pts(c){ return c.rank===5?5 : (c.rank===10||c.rank===13)?10 : 0; }

/* ===== 局面状态 ===== */
let teamLevels=[2,2], declarerTeam=0, declarerSeat=0;
let level=2, trumpSuit='NT', SEQ=[], SEQIDX={};
let players=[], kitty=[], gameOver=false;
let phase='', trick=[], trickOrder=[], turnPos=0, leadSeat=0, lastTrickInfo=null;
let playedCards=[];
let voidGroups=[];
let teamPoints=[0,0];           // 各队本局收到的分(只闲家分用于结算)
let selected=new Set();

function buildSeq(){ SEQ=[]; SEQIDX={}; for(let r=2;r<=14;r++) if(r!==level) SEQ.push(r);
  SEQ.forEach((r,i)=>SEQIDX[r]=i); }

/* ===== 牌的属性 ===== */
function isTrump(c){ return !!c.joker || c.rank===level || (trumpSuit!=='NT'&&c.suit===trumpSuit); }
function effSuit(c){ return isTrump(c)?'T':c.suit; }
function tval(c){
  if(c.joker==='B') return 1006; if(c.joker==='S') return 1005;
  if(c.rank===level) return c.suit===trumpSuit?1004:1003;
  if(isTrump(c)) return 100+c.rank;     // 主花色自然牌
  return c.rank;                        // 副牌按点数
}
function rankText(c){ if(c.joker) return c.joker==='B'?'大':'小';
  return ({11:'J',12:'Q',13:'K',14:'A'})[c.rank]||''+c.rank; }

/* ===== 牌型识别 ===== */
function sameCard(a,b){ return a.joker?a.joker===b.joker : (!b.joker&&a.rank===b.rank&&a.suit===b.suit); }
function detectCombo(cards){
  if(!cards.length) return null;
  const g=effSuit(cards[0]); if(cards.some(c=>effSuit(c)!==g)) return null;
  if(cards.length===1) return {type:'single',size:1,group:g,topVal:tval(cards[0])};
  if(cards.length===2 && sameCard(cards[0],cards[1])) return {type:'pair',size:2,group:g,topVal:tval(cards[0])};
  if(cards.length>=4 && cards.length%2===0){
    const t=asTractor(cards,g); if(t) return t;
  }
  return null;
}
function tractorVal(c){
  if(isTrump(c)){
    if(c.joker==='B') return 15;
    if(c.joker==='S') return 14;
    if(c.rank===level){
      return (trumpSuit!=='NT' && c.suit===trumpSuit) ? 13 : 12;
    }
    return SEQIDX[c.rank];
  }
  return SEQIDX[c.rank];
}
function asTractor(cards,g){
  if(cards.some(c=>effSuit(c)!==g)) return null;
  const byKey={};
  cards.forEach(c=>{
    const k = c.joker ? c.joker : (c.suit + '_' + c.rank);
    (byKey[k] = byKey[k] || []).push(c);
  });
  const ranks=[];
  for(const k in byKey){
    if(byKey[k].length !== 2) return null;
    ranks.push(tractorVal(byKey[k][0]));
  }
  if(ranks.length !== cards.length/2) return null;
  ranks.sort((a,b)=>a-b);
  for(let i=1;i<ranks.length;i++) {
    if(ranks[i]-ranks[i-1]!==1) return null;
  }
  let maxVal = -1;
  cards.forEach(c => {
    const v = tval(c);
    if(v > maxVal) maxVal = v;
  });
  return {type:'tractor',size:cards.length,group:g,topVal:maxVal};
}

/* ===== 跟牌合法性 ===== */
function inGroup(c,group){ return group==='T'?isTrump(c):(!isTrump(c)&&c.suit===group); }
function hasPair(cards,group){ const m={}; for(const c of cards){ if(!inGroup(c,group))continue;
  const k=c.suit+c.rank+(c.joker||''); if(m[k]) return true; m[k]=1; } return false; }
function validateFollow(sel,hand,lead){
  if(sel.length!==lead.size) return {ok:false,why:`需要出 ${lead.size} 张`};
  const G=hand.filter(c=>inGroup(c,lead.group)), need=Math.min(lead.size,G.length);
  const selG=sel.filter(c=>inGroup(c,lead.group)).length;
  if(selG!==need) return {ok:false,why:`必须跟 ${need} 张${lead.group==='T'?'主牌':SUIT_NAME[lead.group]}`};
  if(lead.type==='pair' && G.length>=2 && hasPair(hand,lead.group) && !hasPair(sel,lead.group))
    return {ok:false,why:'有对子时必须出对子'};
  // 跟拖拉机: 凑不出同样的连对时, 也要尽量用手上现成的对子, 不能拆对垫单张
  if(lead.type==='tractor'){
    const needPairs=Math.min(lead.size/2, countPairs(hand, lead.group));
    if(countPairs(sel, lead.group) < needPairs)
      return {ok:false, why:`有对子时必须尽量用对子跟`};
  }
  // 跟甩牌: 有对子就必须跟对(不能拆对保留来牵制)
  if(lead.type==='throw' && lead.pairs>0){
    const needPairs=Math.min(lead.pairs, countPairs(hand, lead.group));
    if(countPairs(sel, lead.group) < needPairs)
      return {ok:false, why:`有对子时必须跟够 ${needPairs} 个对子`};
  }
  return {ok:true};
}
function forcedFollow(hand,lead){             // 一定合法的兜底跟牌
  const G=hand.filter(c=>inGroup(c,lead.group)).slice().sort((a,b)=>tval(a)-tval(b));
  const need=Math.min(lead.size,G.length), out=[];
  // 需要跟的对子数: 对子=1, 拖拉机=尽量用现有对子凑, 甩牌=其含的对子数
  const needPairs = lead.type==='pair' ? 1
    : lead.type==='tractor' ? Math.min(lead.size/2, countPairs(G, lead.group))
    : (lead.type==='throw' ? (lead.pairs||0) : 0);
  if(needPairs>0){
    const m={}; const got=[];
    for(const c of G){ const k=c.suit+c.rank+(c.joker||'');
      if(m[k]){ got.push(m[k],c); m[k]=null; if(got.length/2>=needPairs) break; } else m[k]=c; }
    for(const c of got){ if(out.length<need) out.push(c); }
  }
  for(const c of G){ if(out.length>=need) break; if(!out.includes(c)) out.push(c); }
  if(out.length<lead.size){ const others=hand.filter(c=>!inGroup(c,lead.group)&&!out.includes(c))
      .sort((a,b)=>pts(a)-pts(b)||tval(a)-tval(b)); while(out.length<lead.size&&others.length) out.push(others.shift()); }
  return out.slice(0,lead.size);
}

/* ===== 比墩 ===== */
function trickWinner(){
  const lead=trick[0].combo;
  if(lead && lead.type==='throw'){
    // 甩牌已是同花色最大, 默认领出者赢; 仅当有人缺门用同张数主牌"毙"时被压(取最大者)
    let winner=trick[0].seat, ruffed=false, ruffTop=-1; const N=lead.size;
    for(let i=1;i<trick.length;i++){ const t=trick[i];
      if(lead.group!=='T' && t.cards.length===N && t.cards.every(isTrump)){
        const top=Math.max(...t.cards.map(tval));
        if(!ruffed || top>ruffTop){ ruffed=true; ruffTop=top; winner=t.seat; }
      }
    }
    return winner;
  }
  let best={combo:trick[0].combo, seat:trick[0].seat};
  for(let i=1;i<trick.length;i++){ const c=trick[i].combo; if(!c) continue;
    if(c.type!==best.combo.type||c.size!==best.combo.size) continue;
    const bT=best.combo.group==='T', cT=c.group==='T';
    if(cT&&!bT) best={combo:c,seat:trick[i].seat};
    else if(c.group===best.combo.group && c.topVal>best.combo.topVal) best={combo:c,seat:trick[i].seat};
  }
  return best.seat;
}

/* ===== 排序 / 渲染 ===== */
function suitOrder(c){ if(isTrump(c)) return 0; return {S:1,H:2,C:3,D:4}[c.suit]; }
function sortHand(h){ h.sort((a,b)=> suitOrder(a)-suitOrder(b) || tval(b)-tval(a) || a.suit.localeCompare(b.suit)); }
function cardEl(c,cls){ const d=document.createElement('div');
  d.className='card '+(cls||'')+((c.joker||RED.has(c.suit))?' red':'')+(isTrump(c)?' tr':'')+(pts(c)?' pt':'');
  if(c.joker) d.innerHTML=`<div class="r">${c.joker==='B'?'大':'小'}</div><div class="s">王</div>`;
  else d.innerHTML=`<div class="r">${rankText(c)}</div><div class="s">${SUIT_SYM[c.suit]}</div>`;
  return d; }
function trickPointsSoFar(){ let s=0; trick.forEach(t=>t.cards.forEach(c=>s+=pts(c))); return s; }
function renderSeat(i, leader){ const seat=document.getElementById('seat'+i), p=players[i];
  seat.classList.toggle('turn', phase==='play'&&trickOrder[turnPos]===i&&!gameOver);
  const nm=seat.querySelector('.name');
  if(nm){
    nm.classList.toggle('dealer', i===declarerSeat);
    let db=seat.querySelector('.decl-badge');
    if(declaration && declaration.seat===i){
      if(!db){ db=document.createElement('div'); db.className='decl-badge'; seat.appendChild(db); }
      const suitRed = declaration.suit!=='NT' && RED.has(declaration.suit);
      db.classList.toggle('red', suitRed);
      db.textContent = '主 ' + (declaration.suit==='NT'?'无主':SUIT_SYM[declaration.suit]);
    } else if(db) db.remove();
  }
  if(i!==0) seat.querySelector('.count').textContent='剩 '+p.hand.length+' 张';
  const pl=document.getElementById('play'+i); pl.innerHTML=''; pl.classList.remove('win','leading');
  if(Array.isArray(p.lastShown)){
    const row=document.createElement('div'); row.className='played-row';
    p.lastShown.forEach(c=>row.appendChild(cardEl(c,'mini')));
    pl.appendChild(row);
    if(phase==='play' && leader===i){
      const full = trick.length===4;
      pl.classList.add(full?'win':'leading');
      const b=document.createElement('div'); b.className='cg-badge '+(full?'win':'leading');
      const s=trickPointsSoFar();
      b.textContent = full ? ('赢墩'+(s?(' +'+s+'分'):'')) : '当前最大';
      pl.appendChild(b);
    }
  } }
function renderHand(){ const h=document.getElementById('hand'); h.innerHTML='';
  players[0].hand.forEach(c=>{ const el=cardEl(c); if(selected.has(c.id)) el.classList.add('sel');
    el.onclick=()=>toggleCard(c.id); h.appendChild(el); }); }
function renderAll(){
  const leader = (phase==='play' && trick.length) ? trickWinner() : null;
  [0,1,2,3].forEach(i=>renderSeat(i,leader));
  renderHand(); renderStatus(); renderCenter(); renderSuitPalette(); }
function renderStatus(){ const def=1-declarerTeam;
  const tName = trumpSuit ? (trumpSuit==='NT'?'无主':SUIT_NAME[trumpSuit]) : '—';  // 发牌中的状态已在 infoLine 单独说明, 表头小格只需简洁占位
  document.getElementById('chipTrump').textContent = tName;
  document.getElementById('chipLevel').textContent = rankText({rank:level});
  let info;
  if(phase==='deal'){
    if(dealIdx<100) info = `发牌中 ${dealIdx}/100 · ` + (declaration ? `${NAMES[declaration.seat]}亮${tName}，可反主` : '摸到级牌/王对即可亮主');
    else info = `抢主收官 · ` + (declaration ? `当前 ${tName}（${NAMES[declaration.seat]}）` : '无人亮主');
  } else if(phase==='bury'){
    info = declarerSeat===0 ? '你是庄家，请埋 8 张底牌' : `${NAMES[declarerSeat]} 埋底中…`;
  } else {
    const act = phase==='play' && !gameOver ? NAMES[trickOrder[turnPos]] : '';
    const turn = gameOver ? '' : (trickOrder[turnPos]===0 ? ' · 轮到你' : (act?' · 轮到'+act:''));
    info = `庄家 ${NAMES[declarerSeat]} · 闲家 ${teamPoints[def]}/80` + turn;
  }
  document.getElementById('infoLine').textContent = info; }
function renderCenter(){
  const c=document.getElementById('center-hint');
  if(phase==='deal'){
    const dealing = dealIdx<100, pct = Math.round((dealIdx/100)*100);
    const tName = declaration ? (declaration.suit==='NT'?'无主':SUIT_NAME[declaration.suit]) : (dealing?'发牌':'抢主');
    c.className='cg-center';
    c.innerHTML = `<div class="cg-center-ring${declaration?' declared':''}">${tName}</div>`+

      `<div class="cg-center-bar" style="width:78px;margin:4px auto 0;"><div style="width:${Math.min(100,v/80*100)}%"></div></div>`;
  } else {
    c.className='cg-center cg-center-watermark'; c.textContent='升级 · 拖拉机';
  } }
function updateBuryLabel(){ const b=document.getElementById('bBury');
  if(b){ b.textContent=`埋底 ${selected.size}/8`; b.disabled = selected.size!==8; } }
function toggleCard(id){ if(gameOver) return;
  if(!(phase==='bury' || (phase==='play'&&trickOrder[turnPos]===0))) return;
  if(selected.has(id)) selected.delete(id); else selected.add(id); Sound.play('click'); renderHand();
  if(phase==='bury') updateBuryLabel(); }

/* ===== 控制栏 ===== */
function setControls(html){ document.getElementById('controls').innerHTML=html; }
function baseControls(){ setControls(
  `<button id="bPlay">出牌</button><button id="bHint" class="ghost">提示</button>`+
  `<button id="bSort" class="ghost">理牌</button><button id="bHelp" class="ghost">规则</button>`);
  bPlay.onclick=onPlay; bHint.onclick=onHint;
  bSort.onclick=()=>{ sortHand(players[0].hand); renderHand(); };
  bHelp.onclick=()=>window.open('help.html#shengji','_blank'); }

/* ===== 发牌 / 亮主·反主 / 扣底 ===== */
// 亮主强度: 级牌单张=1, 级牌对子=2(可反主), 小王对=3, 大王对=4(无主)。只能被更高强度压过。
let dealPile=[], dealIdx=0, dealTimer=null, declaration=null, firstDeal=true, declareSig='';
const DEAL_MS=130, DECLARE_WINDOW_MS=8000;

function newGame(){ teamLevels=[2,2]; declarerTeam=0; declarerSeat=0; gameOver=false; firstDeal=true; startDeal(); }
function startDeal(){
  if(dealTimer){ clearTimeout(dealTimer); dealTimer=null; }
  level=teamLevels[declarerTeam]; buildSeq();
  trumpSuit=null; declaration=null; declareSig='';
  dealPile=shuffle(makeDeck());
  players=[0,1,2,3].map(i=>({idx:i,hand:[],lastShown:null}));
  kitty=[]; teamPoints=[0,0]; selected.clear(); trick=[]; lastTrickInfo=null; playedCards=[];
  voidGroups=[0,1,2,3].map(()=>new Set());
  dealIdx=0; phase='deal';
  log(`新一局：打 ${rankText({rank:level})}　发牌中…摸到级牌(${rankText({rank:level})})可亮主`);
  renderAll();
  dealStep();
}
function dealStep(){
  if(dealIdx<100){
    const seat=dealIdx%4;
    players[seat].hand.push(dealPile[dealIdx]);
    sortHand(players[seat].hand);
    dealIdx++;
    if(dealIdx%4===0) Sound.play('deal');
    aiMaybeDeclare();
    renderDeal();
    dealTimer=setTimeout(dealStep, DEAL_MS);
  } else {
    kitty=dealPile.slice(100);                  // 末 8 张做底牌
    aiMaybeDeclare();
    renderDeal();                               // 刷新一次, 免得发牌最后一刻的反主没显示出来
    log(`发牌结束，可看清手牌后再亮主/反主（约 ${(DECLARE_WINDOW_MS/1000).toFixed(1)} 秒）`);
    dealTimer=setTimeout(finishDeclare, DECLARE_WINDOW_MS);  // 留个反主窗口, 让人看清手牌再决定
  }
}
// 某座位当前手牌能做出的亮主选项(花色 + 强度)
function declareOptions(seat){
  const h=players[seat].hand, opts=[];
  for(const s of SUITS){
    const n=h.filter(c=>!c.joker && c.rank===level && c.suit===s).length;
    if(n>=1) opts.push({suit:s, strength:n>=2?2:1});
  }
  const bj=h.filter(c=>c.joker==='B').length, sj=h.filter(c=>c.joker==='S').length;
  if(bj>=2) opts.push({suit:'NT', strength:4});
  else if(sj>=2) opts.push({suit:'NT', strength:3});
  return opts;
}
// 能否亮/反主: 必须强度更高; 且"自己不能反自己"——同一人只能在同花色上加固
function canDeclare(seat, suit, strength){
  if(!declaration) return true;
  if(strength<=declaration.strength) return false;
  if(declaration.seat===seat && suit!==declaration.suit) return false;  // 加固只能同花色
  return true;
}
function setDeclaration(seat, suit, strength){
  const isCounter = !!declaration;
  declaration={seat, suit, strength};
  trumpSuit=suit;
  const sName = suit==='NT' ? '无主' : SUIT_NAME[suit];
  log(`${NAMES[seat]} ${isCounter?'反主':'亮主'} ${sName}`);
  Sound.speak(isCounter ? ['反主', sName] : ['亮'+sName], seat);
  players.forEach(p=>sortHand(p.hand));
  declareSig='';                                // 强制刷新人类亮主按钮
}
function humanDeclare(suit, strength){
  if(phase!=='deal' || !canDeclare(0, suit, strength)) return;
  setDeclaration(0, suit, strength);
  renderDeal();
}
function declarationScore(hand,opt){
  const suit=opt.suit;
  if(suit==='NT') return 500 + opt.strength*100;
  const natural=hand.filter(c=>!c.joker && c.suit===suit);
  const controls=natural.filter(c=>c.rank>=12).length;
  const levelCards=hand.filter(c=>!c.joker && c.rank===level).length;
  const points=natural.reduce((sum,c)=>sum+pts(c),0);
  return opt.strength*120 + natural.length*18 + controls*24 + levelCards*10 + points*0.5;
}
function shouldAiDeclare(hand,opt){
  if(opt.strength>=3) return true;
  if(hand.length<12) return false;
  const natural=hand.filter(c=>!c.joker && c.suit===opt.suit);
  const controls=natural.filter(c=>c.rank>=12).length;
  if(opt.strength===2) return natural.length>=7 || (natural.length>=6 && controls>=2);
  return natural.length>=7 && controls>=2;
}
function aiMaybeDeclare(){
  for(let seat=1; seat<4; seat++){
    const h=players[seat].hand;
    const opts=declareOptions(seat).filter(o=>canDeclare(seat, o.suit, o.strength));
    if(!opts.length) continue;
    opts.sort((a,b)=>declarationScore(h,b)-declarationScore(h,a));
    const best=opts[0];
    if(shouldAiDeclare(h,best)) setDeclaration(seat, best.suit, best.strength);
  }
}
function renderDeal(){ renderAll(); updateDeclareControls(); }
// 亮主/反主面板: 常驻在手牌上方的 5 格花色调色板(♠♥♣♦+无主), 摸到符合条件的牌就点亮, 随时可点
function renderSuitPalette(){
  const box=document.getElementById('suitPalette');
  if(phase!=='deal'){ box.innerHTML=''; return; }
  const myOpts=declareOptions(0).filter(o=>canDeclare(0,o.suit,o.strength));
  const optBy={}; myOpts.forEach(o=>optBy[o.suit]=o);
  const any=myOpts.length>0;
  let tiles='';
  for(const s of ['S','H','C','D','NT']){
    const o=optBy[s], avail=!!o;
    const active = !!(declaration && declaration.seat===0 && trumpSuit===s);
    const red = s!=='NT' && RED.has(s);
    const topLabel = s==='NT' ? '无主' : rankText({rank:level});
    const sym = s==='NT' ? '王' : SUIT_SYM[s];
    let subLabel='—';
    if(avail){
      if(active) subLabel='已亮';
      else if(s==='NT') subLabel = o.strength>=4 ? '大王' : '小王';
      else subLabel = declaration ? '反主' : (o.strength>=2 ? '对' : '亮');
    }
    tiles += `<button class="suitTile${avail?' avail':''}${avail&&red?' red':''}${active?' active':''}" `+
      (avail?`data-s="${s}" data-st="${o.strength}"`:'disabled')+`>`+
      `<div class="tt-r">${topLabel}</div><div class="tt-s">${sym}</div><div class="tt-l">${subLabel}</div></button>`;
  }
  box.innerHTML = `<div class="cg-palette-hint${any?' active':''}">${any?'点亮花色抢主 ▾':'摸到级牌 / 王对即可亮主'}</div>`+
    `<div class="cg-palette-row">${tiles}</div>`;
  box.querySelectorAll('.suitTile.avail').forEach(b=>b.onclick=()=>humanDeclare(b.dataset.s, +b.dataset.st));
}
function updateDeclareControls(){
  if(phase!=='deal') return;
  const dealDone=dealIdx>=100;
  const sig=(declaration?declaration.seat+declaration.suit+declaration.strength:'-')+'|'+dealDone;
  if(sig===declareSig) return; declareSig=sig;
  // 发完牌后给一个"我看好了, 不用等"的按钮, 想清楚随时可以提前结束等待; 花色选择本身已改到常驻调色板
  setControls(dealDone ? `<button id="bConfirmTrump" class="ghost">看好了，开始出牌</button>` : '');
  const cb=document.getElementById('bConfirmTrump'); if(cb) cb.onclick=confirmDeclareNow;
}
function confirmDeclareNow(){
  if(phase!=='deal') return;
  if(dealTimer){ clearTimeout(dealTimer); dealTimer=null; }
  finishDeclare();
}
function finishDeclare(){
  dealTimer=null;
  if(declaration){
    trumpSuit=declaration.suit;
    if(firstDeal){ declarerSeat=declaration.seat; declarerTeam=team(declarerSeat); }
  } else {
    trumpSuit='NT';
    if(firstDeal){ declarerSeat=0; declarerTeam=0; }   // 首局无人亮 → 你坐庄、无主
  }
  firstDeal=false;
  level=teamLevels[declarerTeam]; buildSeq();
  players.forEach(p=>sortHand(p.hand));
  log(`主牌：${trumpSuit==='NT'?'无主':SUIT_NAME[trumpSuit]}　庄家：${NAMES[declarerSeat]}`);
  // 庄家拿底牌
  const d=players[declarerSeat]; d.hand.push(...kitty); kitty=[]; sortHand(d.hand);
  phase='bury'; renderAll(); beginBury();
}
function beginBury(){
  if(declarerSeat!==0){ aiBury(); return; }
  setControls(`<button id="bBury">埋底 0/8</button><button id="bSort" class="ghost">理牌</button>`+
    `<button id="bHelp" class="ghost">规则</button>`);
  bBury.onclick=confirmBury; bSort.onclick=()=>{ sortHand(players[0].hand); renderHand(); };
  bHelp.onclick=()=>window.open('help.html#shengji','_blank');
  renderAll(); updateBuryLabel(); log('你拿到底牌，请选 8 张埋入底牌（避免埋分牌/主牌）');
}
function confirmBury(){
  if(selected.size!==8){ flash('请正好选择 8 张'); return; }
  const d=players[0]; kitty=d.hand.filter(c=>selected.has(c.id));
  d.hand=d.hand.filter(c=>!selected.has(c.id)); selected.clear(); sortHand(d.hand);
  Sound.speak("埋底", 0);
  startPlay();
}
function aiBury(){
  const d=players[declarerSeat];
  let remaining=d.hand.slice(), buried=[];
  const keyOf=c=>c.joker ? c.joker : (c.suit+'_'+c.rank);
  const tractorIds=new Set();
  for(const group of ['T',...SUITS]){
    const segment=remaining.filter(c=>inGroup(c,group));
    const tractor=longestTractor(segment);
    if(tractor) tractor.forEach(c=>tractorIds.add(c.id));
  }
  const buryScore=(c,cards)=>{
    const isT=isTrump(c), group=isT?'T':c.suit;
    const suitCount=cards.filter(x=>inGroup(x,group)).length;
    const sameCount=cards.filter(x=>keyOf(x)===keyOf(c)).length;
    let score=isT ? 1500 : 0;
    if(!isT){
      if(suitCount===1) score-=360;
      else if(suitCount===2) score-=190;
      else if(suitCount===3) score-=80;
      else if(suitCount>=7) score+=65;
    }
    if(pts(c)===10) score+=260;
    else if(pts(c)===5) score+=150;
    if(c.rank===14) score+=280;
    else if(c.rank===13) score+=150;
    else if(c.rank===12) score+=80;
    else if(c.rank===11) score+=35;
    else if(!isT) score+=c.rank;
    else score+=tval(c);
    if(sameCount===2) score+=520;
    else if(sameCount>=3) score+=120;
    if(tractorIds.has(c.id)) score+=380;
    return score;
  };
  while(buried.length<8){
    const choice=remaining.slice().sort((a,b)=>buryScore(a,remaining)-buryScore(b,remaining))[0];
    buried.push(choice);
    remaining=remaining.filter(c=>c.id!==choice.id);
  }
  kitty=buried;
  const ids = new Set(kitty.map(c=>c.id));
  d.hand = d.hand.filter(c=>!ids.has(c.id));
  sortHand(d.hand);
  
  Sound.speak("埋底", declarerSeat);
  startPlay();
}

/* ===== 出牌流程 ===== */
function startPlay(){ phase='play'; baseControls(); leadSeat=declarerSeat; startTrick(leadSeat); }
function startTrick(lead){ trick=[]; trickOrder=[lead,(lead+1)%4,(lead+2)%4,(lead+3)%4]; turnPos=0;
  // 上一墩的展示已经在 resolveTrick 里停留过一段时间了, 新一墩开始时清空, 免得挡视线
  players.forEach(q=>q.lastShown=null);
  renderAll(); takeTurn(); }
function takeTurn(){
  if(turnPos>=4){ return resolveTrick(); }
  const seat=trickOrder[turnPos];
  renderAll(); updateControls();
  if(seat===0) return;                 // 等人类
  // 开声音时放慢节奏, 让"对+花色+点数"的语音念完再下一手; 静音时保持轻快
  setTimeout(()=>{ const cards = turnPos===0? aiLead(seat) : aiFollow(seat); commit(seat,cards); }, Sound.muted?550:1000);
}
function updateControls(){ const my=phase==='play'&&trickOrder[turnPos]===0&&!gameOver;
  const bp=document.getElementById('bPlay'), bh=document.getElementById('bHint');
  if(bp) bp.disabled=!my; if(bh) bh.disabled=!my; }
function commit(seat,cards){
  const p=players[seat]; const ids=new Set(cards.map(c=>c.id));
  if(turnPos>0 && trick[0] && trick[0].combo && trick[0].combo.group!=='T'){
    const leadGroup=trick[0].combo.group;
    if(!p.hand.some(c=>inGroup(c,leadGroup))) voidGroups[seat].add(leadGroup);
  }
  p.hand=p.hand.filter(c=>!ids.has(c.id)); p.lastShown=cards.slice();
  let combo;
  if(turnPos===0){
    combo=detectCombo(cards);
    if(!combo){ const tw=validateThrow(cards); if(tw.ok) combo=makeThrowCombo(cards, tw.group); }  // 甩牌
  } else combo=detectCombo(cards);

  trick.push({seat,cards:cards.slice(),combo});
  playedCards.push(...cards);
  log(`${NAMES[seat]} 出 ${cards.map(rankText).join('')}`);
  Sound.play('play');
  turnPos++; takeTurn();
}
function resolveTrick(){
  renderAll();          // 关键: 渲染最后一手(否则第4家的牌/牌数不显示, 取消轮到高亮)
  const w=trickWinner(); const wt=team(w);
  let p=0; trick.forEach(t=>t.cards.forEach(c=>p+=pts(c)));
  teamPoints[wt]+=p;
  document.getElementById('play'+w).classList.add('win');
  lastTrickInfo={winner:w, size:trick[0].cards.length, combo:trick[0].combo};
  log(`${NAMES[w]} 赢墩` + (p?`，得 ${p} 分`:''));
  Sound.play(wt === team(0) ? 'win' : 'pass');
  renderStatus();
  const done = players.every(pl=>pl.hand.length===0);
  setTimeout(()=>{ if(done) endDeal(); else startTrick(w); }, Sound.muted?900:1300);
}

/* ===== AI ===== */
function groupPairs(G){ const m={},res=[]; for(const c of G){ const k=c.suit+c.rank+(c.joker||'');
    if(m[k]){ res.push([m[k],c]); m[k]=null; } else m[k]=c; }
  return res.sort((a,b)=>tval(a[0])-tval(b[0])); }
function pairsInSeq(G){ // G 内可组成拖拉机的对子(排除百搭/王/级牌单独凑成的对), 按牌序位置排序
  const byRank={};
  G.forEach(c=>{ if(effSuit(c)==='T' && (c.joker||c.rank===level||c.suit!==trumpSuit)) return;
    const k=c.suit+c.rank; (byRank[k]=byRank[k]||[]).push(c); });
  const pairs=Object.values(byRank).filter(a=>a.length>=2).map(a=>[a[0],a[1]]);
  pairs.sort((a,b)=>SEQIDX[a[0].rank]-SEQIDX[b[0].rank]);
  return pairs; }
function adjacentPair(a,b){ return a.suit===b.suit && SEQIDX[a.rank]-SEQIDX[b.rank]===1; } // 同花色且序位相邻
function tractorsOf(G,size){ // 同组 size 张连对
  const need=size/2, pairs=pairsInSeq(G);
  const res=[];
  for(let i=0;i+need<=pairs.length;i++){ let ok=true;
    for(let j=1;j<need;j++) if(!adjacentPair(pairs[i+j][0],pairs[i+j-1][0])){ok=false;break;}
    if(ok) res.push(pairs.slice(i,i+need).flat()); }
  return res; }
function longestTractor(G){ // G 内最长的一段连对(拖拉机), 没有则 null
  const pairs=pairsInSeq(G);
  let best=[], run=[];
  for(let i=0;i<pairs.length;i++){
    if(i>0 && !adjacentPair(pairs[i][0],pairs[i-1][0])) run=[];
    run.push(pairs[i]);
    if(run.length>=2 && run.length>best.length) best=run.slice();
  }
  return best.length? best.flat() : null; }
function anotherPlayerKnownVoid(seat,group){
  return voidGroups.some((groups,idx)=>idx!==seat && groups.has(group));
}
function leadCandidateScore(seat,cards,kind){
  const hand=players[seat].hand;
  const combo=detectCombo(cards) || (kind==='throw' && validateThrow(cards).ok
    ? makeThrowCombo(cards, isTrump(cards[0])?'T':cards[0].suit) : null);
  if(!combo) return -Infinity;
  const points=cards.reduce((sum,c)=>sum+pts(c),0);
  const isT=cards.every(isTrump), group=isT?'T':cards[0].suit;
  const keyOf=c=>c.joker ? c.joker : c.suit+'_'+c.rank;
  let score=kind==='throw'?55:0;
  if(points===0) score+=28; else score-=points*3;
  if(combo.type==='tractor') score+=70;
  else if(combo.type==='pair') score+=40;
  else if(combo.type==='throw') score+=20;
  if(cards.length>1) score+=(cards.length-1)*12;
  if(isT){
    const trumpCount=hand.filter(isTrump).length;
    score+=team(seat)===declarerTeam ? (trumpCount>=7?32:-12) : -18;
    score+=Math.min(24,Math.max(...cards.map(tval))/40);
  } else if(cards.length===1){
    const suitCount=hand.filter(c=>!isTrump(c)&&c.suit===group).length;
    const sameCount=hand.filter(c=>keyOf(c)===keyOf(cards[0])).length;
    if(suitCount<=2) score+=30;
    else if(suitCount>=7) score-=10;
    if(cards[0].rank<=10 && !points) score+=12;
    if(sameCount>=2) score-=45;
  }
  if(!isT && anotherPlayerKnownVoid(seat,group)) score-=kind==='throw'?70:24;
  if(!anyOpponentBeats(cards,seat)) score+=35;
  if(hand.length<=cards.length+4) score+=25;
  return score;
}
function strategicLead(seat){
  const hand=players[seat].hand, candidates=[], seen=new Set();
  const add=(cards,kind='normal')=>{
    if(!cards||!cards.length) return;
    const key=cards.map(c=>c.id).sort((a,b)=>a-b).join(',');
    if(seen.has(key)) return;
    seen.add(key); candidates.push({cards,kind});
  };
  add(bestThrow(seat),'throw');
  for(const group of ['T',...SUITS]){
    const segment=hand.filter(c=>inGroup(c,group));
    add(safeTractor(segment,seat),'tractor');
    groupPairs(segment).forEach(pair=>add(pair,'pair'));
    segment.forEach(card=>add([card],'single'));
  }
  let best=null, bestScore=-Infinity;
  for(const candidate of candidates){
    const score=leadCandidateScore(seat,candidate.cards,candidate.kind);
    if(score>bestScore){ bestScore=score; best=candidate.cards; }
  }
  return best;
}
function aiLead(seat){
  const hand=players[seat].hand;
  const strategic=strategicLead(seat);
  if(strategic) return strategic;
  const tw=bestThrow(seat); if(tw) return tw;          // 1. 有把握的甩牌
  
  const nonTr=hand.filter(c=>!isTrump(c));

  // 2. 优先出非主牌中的拖拉机：先试真正最长的一段(可能含分)，无分或读全手牌确认安全就直接出；
  //    否则退回旧逻辑——只在不含分的牌里找连对(不会送分，但可能更短或找不到)
  const ntr=safeTractor(nonTr, seat);
  if(ntr) return ntr;

  // 3. 出非主牌中的对子，优先出大对子（比如AA、KK等）以控手；K 对含分，需确认无人能大过才出（A 对本身不含分，仍可直接出）
  const npairs=groupPairs(nonTr);
  if(npairs.length){
    npairs.sort((a,b)=>tval(b[0])-tval(a[0]));
    if(tval(npairs[0][0]) >= 13 && (pts(npairs[0][0])===0 || !anyOpponentBeats(npairs[0], seat))) return npairs[0]; // K是13, A是14
  }

  // 4. 出非主牌中的单张A（大牌先发，控手且能安全收分）
  const aces=nonTr.filter(c=>c.rank===14);
  if(aces.length){
    return [aces[0]];
  }

  // 5. 调主（主牌多时，主动出主牌消耗对手将牌）
  const T=hand.filter(c=>isTrump(c));
  const oppTrumpMax=unseenCardsForAI(seat).filter(isTrump).length;
  if(T.length>oppTrumpMax+1){
    const ttr=safeTractor(T, seat); if(ttr) return ttr;

    const tprFull=groupPairs(T);
    if(tprFull.length){
      tprFull.sort((a,b)=>tval(b[0])-tval(a[0]));
      if(pts(tprFull[0][0])===0 || !anyOpponentBeats(tprFull[0], seat)) return tprFull[0];
    }
    const Tsafe=T.filter(c=>pts(c)===0);
    const tpr=groupPairs(Tsafe);
    if(tpr.length){
      tpr.sort((a,b)=>tval(b[0])-tval(a[0]));
      return tpr[0];
    }
    const tsingFull=T.slice().sort((a,b)=>tval(b)-tval(a));
    if(tsingFull.length && (pts(tsingFull[0])===0 || !anyOpponentBeats([tsingFull[0]], seat))) return [tsingFull[0]];
    const tsing=Tsafe.sort((a,b)=>tval(b)-tval(a));
    if(tsing.length) return [tsing[0]];
  }

  // 6. 如果有其他对子，也可以出；按从大到小顺序找第一个"不含分或读全手牌确认安全"的对子，不再无脑出最大对子送分
  if(npairs.length){
    const safePair=npairs.find(pr=>pts(pr[0])===0||!anyOpponentBeats(pr, seat));
    if(safePair) return safePair;
  }

  // 7. 兜底：出最小的非主牌（不送分给对手）
  const pool=(nonTr.length?nonTr:hand).slice().sort((a,b)=>pts(a)-pts(b)||tval(a)-tval(b));
  return [pool[0]];
}
function shouldRuff(seat,leadSize,trickPoints,isLastPlayer){
  if(players[seat].hand.length<=leadSize+2) return true;
  if(trickPoints>0) return true;
  return isLastPlayer && teamPoints[1-declarerTeam]>=75;
}
function aiFollow(seat){
  const hand=players[seat].hand, lead=trick[0].combo;
  if(lead.type==='throw') return forcedFollow(hand, lead);   // 跟甩牌: 同花色优先, 不够再凑
  const best={combo:trick.reduce((b,t)=>{ if(!t.combo)return b; if(!b)return t;
      const bT=b.combo.group==='T',cT=t.combo.group==='T';
      if(cT&&!bT)return t; if(t.combo.group===b.combo.group&&t.combo.topVal>b.combo.topVal)return t; return b; },null).combo,
    seat:(()=>{ let b=trick[0]; for(const t of trick){ if(!t.combo)continue;
      const bT=b.combo.group==='T',cT=t.combo.group==='T';
      if(cT&&!bT)b=t; else if(t.combo&&t.combo.group===b.combo.group&&t.combo.topVal>b.combo.topVal)b=t; } return b.seat; })()};
  const oppWin=team(best.seat)!==team(seat), mateWin=!oppWin&&best.seat!==seat;
  const G=hand.filter(c=>inGroup(c,lead.group)).sort((a,b)=>tval(a)-tval(b));
  const beats=cards=>{ const c=detectCombo(cards); if(!c||c.type!==lead.type||c.size!==lead.size) return false;
    if(c.group==='T'&&best.combo.group!=='T') return true;
    return c.group===best.combo.group && c.topVal>best.combo.topVal; };
  // 对手正赢牌时，从"能压过当前最大牌"的候选里挑真正稳的一手：打出后，后面还没出牌的对手也大不过(全信息)。
  // 优先挑刚好够用的最小一手；如果每一手都稳不住(后面对手能反超)，返回 null——不该为了赢不了的墩硬搭一张
  // 更值钱的牌，那样墩和牌一起丢，不如留着，交给下面的兜底逻辑去垫最小/最不值钱的。
  const safestBeat=cands=>{ for(const cand of cands){ if(!remainingOppCanBeat(detectCombo(cand),seat)) return cand; } return null; };

  // 队友赢牌时，是否需要垫分？直接读还没出牌的对手手里到底有没有能大过队友的牌(全信息, 不是猜)，
  // 而不是只用"是不是最后一家"/"是不是王牌"这种粗糙代理去判断 —— 那样会漏掉很多其实已经稳了的情况，
  // 比如对方主牌已经出光了，却因为还没轮到最后一家就白白不敢垫分。
  const isLastPlayer = (turnPos === 3);
  const partnerWinsDefinitively = mateWin && !remainingOppCanBeat(best.combo, seat);
  
  const notOvertake=v=>v<best.combo.topVal;
  let chosen=null;
  if(G.length>=lead.size){
    if(lead.type==='single'){
      if(oppWin){ const c=safestBeat(G.filter(x=>beats([x])).map(x=>[x])); if(c) chosen=c; }
      if(!chosen){
        const pool = mateWin && G.some(c=>notOvertake(tval(c))) ? G.filter(c=>notOvertake(tval(c))) : G;
        const s=pool.slice().sort((a,b)=> partnerWinsDefinitively? (pts(b)-pts(a)||tval(a)-tval(b)) : (pts(a)-pts(b)||tval(a)-tval(b))); chosen=[s[0]];
      }
    } else if(lead.type==='pair'){
      const prs=groupPairs(G);
      if(oppWin){ const c=safestBeat(prs.filter(p=>beats(p))); if(c) chosen=c; }
      if(!chosen){ if(prs.length){
          if(mateWin){
            const pool = prs.some(p=>notOvertake(tval(p[0]))) ? prs.filter(p=>notOvertake(tval(p[0]))) : prs;
            chosen = pool.slice().sort((a,b)=>partnerWinsDefinitively? (pts(b[0])-pts(a[0])||tval(a[0])-tval(b[0])) : (pts(a[0])-pts(b[0])||tval(a[0])-tval(b[0])))[0];
          } else chosen=prs[0];
        }
        else { const s=G.slice().sort((a,b)=> partnerWinsDefinitively?(pts(b)-pts(a)):(pts(a)-pts(b))||tval(a)-tval(b)); chosen=[s[0],s[1]]; } }
    } else { const trs=tractorsOf(G,lead.size);
      if(oppWin){ const c=safestBeat(trs.filter(t=>beats(t))); if(c) chosen=c; }
      if(!chosen) chosen= trs[0] || G.slice(0,lead.size); }
  } else if(G.length===0){
    // 空对空的将吃逻辑
    const trickPts=trick.reduce((s,t)=>s+t.cards.reduce((s2,c)=>s2+pts(c),0),0);
    const worthRuffing=shouldRuff(seat,lead.size,trickPts,isLastPlayer);
    if(oppWin && worthRuffing){            // 用主牌将吃(含反扣)
      const T=hand.filter(c=>isTrump(c)).sort((a,b)=>tval(a)-tval(b));
      if(lead.type==='single' && T.length) { const c=safestBeat(T.filter(x=>beats([x])).map(x=>[x])); if(c) chosen=c; }
      else if(lead.type==='pair'){ const tp=safestBeat(groupPairs(T).filter(p=>beats(p))); if(tp) chosen=tp; }
      else { const tt=safestBeat(tractorsOf(T,lead.size).filter(t=>beats(t))); if(tt) chosen=tt; }
    }
    if(!chosen){ const pool=hand.slice().sort((a,b)=> partnerWinsDefinitively?(pts(b)-pts(a)):(pts(a)-pts(b))||tval(a)-tval(b)); chosen=pool.slice(0,lead.size); }
  } else {
    // 凑不齐门数垫牌
    const need=lead.size-G.length;
    const sortFillers=cs=>cs.sort((a,b)=> partnerWinsDefinitively?(pts(b)-pts(a)):(pts(a)-pts(b))||tval(a)-tval(b));
    const otherNonTrump=sortFillers(hand.filter(c=>!inGroup(c,lead.group)&&!isTrump(c)));
    const fillers = otherNonTrump.length>=need ? otherNonTrump : sortFillers(hand.filter(c=>!inGroup(c,lead.group)));
    chosen=[...G, ...fillers.slice(0,need)];
  }
  if(!chosen || !validateFollow(chosen,hand,lead).ok) chosen=forcedFollow(hand,lead);
  return chosen;
}

/* ===== 甩牌 =====
   规则: 领出时可把同一门花色的多张牌一起甩出。只有当甩出的每一手(单张/对子)
   都没有对手能压过(同花色更大的牌都已出过或在自己手里)时才甩得出去;
   只要有一张能被压, 即甩牌失败, 强制打出其中最小的一张。            */
function validateThrow(sel){
  if(sel.length<2) return {ok:false, why:'请出单张/对子/连对，或同花色多张甩牌'};
  const g = isTrump(sel[0]) ? 'T' : sel[0].suit;
  if(!sel.every(c=>inGroup(c,g))) return {ok:false, why:'甩牌必须是同一门花色（或全是主牌）'};
  return {ok:true, group:g};
}
function decomposeThrow(sel){                 // 拆成连对(拖拉机, 各对用代表张数组)/独立对子(每对一张代表)/单张
  const byKey={}; sel.forEach(c=>{ const k=c.suit+'_'+(c.joker||c.rank); (byKey[k]=byKey[k]||[]).push(c); });
  const pairCards=[], singles=[];
  for(const k in byKey){ const a=byKey[k]; let i=0;
    for(; i+1<a.length; i+=2) pairCards.push(a[i]);
    if(i<a.length) singles.push(a[i]); }
  // 从对子代表张里挑出能连成拖拉机的(排除百搭/王/级牌单独凑成的对, 跟 pairsInSeq 同一套口径),
  // 按序位分组找连续段; 连不成拖拉机的(含被排除的百搭/王/级牌对子)各自算独立对子
  const seqable=pairCards.filter(c=>!(effSuit(c)==='T' && (c.joker||c.rank===level||c.suit!==trumpSuit)));
  const pairs=pairCards.filter(c=>effSuit(c)==='T' && (c.joker||c.rank===level||c.suit!==trumpSuit));
  seqable.sort((a,b)=>SEQIDX[a.rank]-SEQIDX[b.rank]);
  const tractors=[]; let run=[];
  for(const c of seqable){
    if(run.length && adjacentPair(c,run[run.length-1])) run.push(c);
    else { if(run.length>=2) tractors.push(run); else pairs.push(...run); run=[c]; }
  }
  if(run.length>=2) tractors.push(run); else pairs.push(...run);
  return {tractors, pairs, singles};
}
function oppMaxPairVal(og){                    // 某玩家该组内最大对子的 tval(无对子=-1)
  const m={}; let best=-1;
  for(const c of og){ const k=c.suit+'_'+(c.joker||c.rank); m[k]=(m[k]||0)+1; if(m[k]>=2) best=Math.max(best,tval(c)); }
  return best;
}
function smallestOf(sel){ return sel.slice().sort((a,b)=>tval(a)-tval(b))[0]; }
function makeThrowCombo(sel,group){
  const {tractors, pairs}=decomposeThrow(sel);
  const totalPairs=pairs.length + tractors.reduce((s,t)=>s+t.length,0);   // 扣底倍率按总对子数算, 不分是否连成拖拉机
  return {type:'throw', size:sel.length, group, topVal:Math.max(...sel.map(tval)), pairs:totalPairs};
}
// 某些牌里在指定组内能凑出的对子数
function countPairs(cards, group){
  const m={}; let n=0;
  for(const c of cards){ if(!inGroup(c,group)) continue;
    const k=c.suit+'_'+(c.joker||c.rank); m[k]=(m[k]||0)+1; if(m[k]%2===0) n++; }
  return n;
}
// 甩牌是否会被压: 返回需强制打出的最小牌(失败) 或 null(成功)。
// 连对(拖拉机)只能被对手同样张数(或更长里含相同张数连续段)的拖拉机压过, 不是随便两个更大的散对子就能压;
// 独立对子/单张则按原规则, 对手有更大的对子/单张就算能压。
function throwBeatable(sel, group, seat){
  const {tractors, pairs, singles}=decomposeThrow(sel);
  const opps=players.filter(p=>p.idx!==seat);
  for(const opp of opps){
    const og=opp.hand.filter(c=>inGroup(c,group));
    if(!og.length) continue;
    const maxSingle=Math.max(...og.map(tval));
    for(const s of singles) if(maxSingle>tval(s)) return smallestOf(sel);
    if(pairs.length){ const mp=oppMaxPairVal(og);
      for(const p of pairs) if(mp>tval(p)) return smallestOf(sel); }
    for(const tr of tractors){
      const oppTr=tractorsOf(og, tr.length*2);
      const oppTrMax=oppTr.length ? Math.max(...oppTr.map(t=>Math.max(...t.map(tval)))) : -1;
      if(oppTrMax>Math.max(...tr.map(tval))) return smallestOf(sel);
    }
  }
  return null;
}
// AI 只能知道自己的手牌、已出牌，以及自己坐庄时看到的底牌。
// 未知牌不能按某个座位分配，只能作为“仍可能存在”的风险池使用。
function knownCardsForAI(seat){
  const ids=new Set(players[seat].hand.map(c=>c.id));
  playedCards.forEach(c=>ids.add(c.id));
  if(declarerSeat===seat) kitty.forEach(c=>ids.add(c.id));
  return (dealPile||[]).filter(c=>ids.has(c.id));
}
function unseenCardsForAI(seat){
  const known=new Set(knownCardsForAI(seat).map(c=>c.id));
  return (dealPile||[]).filter(c=>!known.has(c.id));
}

// AI 甩牌: 只在未知牌已经无法构成毙牌风险时甩出，避免利用隐藏手牌。
function bestThrow(seat){
  const hand=players[seat].hand, unseen=unseenCardsForAI(seat);
  let pick=null;
  for(const s of SUITS){
    const mine=hand.filter(c=>!isTrump(c)&&c.suit===s);
    if(mine.length<2) continue;
    if(unseen.some(isTrump)) continue;
    const oppMax=Math.max(-1,...unseen.filter(c=>!isTrump(c)&&c.suit===s).map(tval));
    const safe=mine.filter(c=>tval(c)>oppMax);
    if(safe.length>=2 && (!pick || safe.length>pick.length)) pick=safe;
  }
  return pick;
}

// 一组候选牌能不能大过给定组合(单/对/连对)。
function oppHandBeats(oppHand, combo){
  const group=combo.group;
  const inSuit=oppHand.filter(c=>inGroup(c,group));
  if(inSuit.length>=combo.size){
    if(combo.type==='single'){ if(Math.max(...inSuit.map(tval))>combo.topVal) return true; }
    else if(combo.type==='pair'){ if(oppMaxPairVal(inSuit)>combo.topVal) return true; }
    else { if(tractorsOf(inSuit,combo.size).some(t=>Math.max(...t.map(tval))>combo.topVal)) return true; }
  } else if(group!=='T' && inSuit.length===0){   // 缺门才可能整手换成主牌; 凑不齐门数时必须先垫上手里现有的这门牌
    const T=oppHand.filter(isTrump);
    if(T.length>=combo.size){
      if(combo.type==='single'){ if(T.length) return true; }
      else if(combo.type==='pair'){ if(oppMaxPairVal(T)>=0) return true; }
      else { if(tractorsOf(T,combo.size).length) return true; }
    }
  }
  return false;
}
// 保守判断：未知牌池中仍存在能压过的组合，就认为对手可能有该牌。
// 未知牌无法按座位分配，因此这里宁可高估风险，也不读取队友或人类的隐藏手牌。
function anyOpponentBeats(cards, seat){
  const combo=detectCombo(cards); if(!combo) return true;
  return oppHandBeats(unseenCardsForAI(seat), combo);
}
// 只要未知牌池仍能构成反超，就不把当前牌权视为绝对稳定。
function remainingOppCanBeat(bestCombo, seat){
  return oppHandBeats(unseenCardsForAI(seat), bestCombo);
}
// 拖拉机安全探测: 先试 pool 里真正最长的一段连对(可能含分), 无分或读全手牌确认安全就用;
// 否则退回旧逻辑——只在不含分的牌里找连对(旧行为, 保底不送分, 但可能更短或找不到)。
function safeTractor(pool, seat){
  const full=longestTractor(pool);
  if(full && (full.every(c=>pts(c)===0) || !anyOpponentBeats(full, seat))) return full;
  return longestTractor(pool.filter(c=>pts(c)===0));
}

/* ===== 人类出牌 ===== */
function onPlay(){ if(!(phase==='play'&&trickOrder[turnPos]===0)) return;
  const sel=players[0].hand.filter(c=>selected.has(c.id));
  if(!sel.length){ flash('请选择要出的牌'); return; }
  if(turnPos===0){
    const c=detectCombo(sel);
    if(!c){                                       // 不是单张/对子/连对 → 尝试甩牌
      const tw=validateThrow(sel);
      if(!tw.ok){ flash(tw.why); return; }
      const fail=throwBeatable(sel, tw.group, 0);
      if(fail){
        const nm=fail.joker?(fail.joker==='B'?'大王':'小王'):(SUIT_SYM[fail.suit]+rankText(fail));
        flash(`甩牌失败：${nm} 可能被压，强制出最小`);
        selected.clear(); commit(0,[fail]); return;
      }
    }
  } else {
    const v=validateFollow(sel,players[0].hand,trick[0].combo); if(!v.ok){ flash(v.why); return; }
  }
  selected.clear(); commit(0,sel);
}
function onHint(){ if(!(phase==='play'&&trickOrder[turnPos]===0)) return;
  let cards;
  if(turnPos===0) cards=aiLead(0); else cards=aiFollow(0);
  selected=new Set(cards.map(c=>c.id)); renderHand();
}

/* ===== 结算 ===== */
function endDeal(){
  const def=1-declarerTeam; let d=teamPoints[def];
  // 扣底翻倍: 闲家赢最后一墩
  let kittyPts=kitty.reduce((s,c)=>s+pts(c),0), bonus=0, mult=1;
  if(lastTrickInfo && team(lastTrickInfo.winner)===def && kittyPts>0){
    const c=lastTrickInfo.combo;
    const pairs = !c ? 0 : c.type==='tractor' ? c.size/2 : c.type==='pair' ? 1 : c.type==='throw' ? (c.pairs||0) : 0;
    mult=Math.pow(2, pairs+1);   // 抠底倍率=2^(对子数+1): 单张2 对子4 两连对8 三连对16 …
    bonus=kittyPts * mult; d+=bonus;
  }
  const dealLevel=level; let body, title, win=false;
  body=`闲家(${def===0?'你方':'对方'})得分：<b>${teamPoints[def]}</b>`+
       (bonus?` ＋扣底翻倍 ${bonus}（底分${kittyPts}×${mult}）= <b>${d}</b>`:'')+`<br>底牌：${kitty.map(rankText).join(' ')||'无'}`;
  let newTeam, newSeat, gain=0, who;
  if(d<80){ who=declarerTeam; gain = d===0?3 : d<40?2 : 1; newTeam=declarerTeam; newSeat=(declarerSeat+2)%4; }
  else { who=def; gain = d<120?0 : d<160?1 : d<200?2 : 3; newTeam=def; newSeat=(declarerSeat+1)%4; }
  if(d<80 && dealLevel===14){ gameOver=true; win=true; }
  if(!gameOver){ teamLevels[who]=Math.min(14, teamLevels[who]+gain); }
  declarerTeam=newTeam; declarerSeat=newSeat;
  const upTxt = who===0?'你方':'对方';
  const playerWin = newTeam === team(0);
  if(win){
    title=(declarerTeam===0?'🏆 你方守住 A，获胜！':'😵 对方守住 A，你方失败');
    Sound.play(declarerTeam === 0 ? 'victory' : 'defeat');
  }
  else if(d<80) {
    title=`庄家(${upTxt})守住，升 ${gain} 级 → ${rankText({rank:teamLevels[who]})}，继续坐庄`;
    Sound.play(playerWin ? 'win' : 'defeat');
  }
  else if(gain===0) {
    title=`闲家(${upTxt})达 ${d} 分，平台上台坐庄`;
    Sound.play(playerWin ? 'win' : 'defeat');
  }
  else {
    title=`闲家(${upTxt})达 ${d} 分，升 ${gain} 级并上台坐庄`;
    Sound.play(playerWin ? 'win' : 'defeat');
  }
  showOverlay(title, body, ()=>{ if(gameOver) newGame(); else startDeal(); }, gameOver?'再来一局':'下一局');
}

/* ===== 通用 UI ===== */
let logs=[]; function log(t){ logs.unshift(t); logs=logs.slice(0,9); const el=document.getElementById('log'); if(el) el.innerHTML=logs.join('<br>'); }
function flash(t){ log('⚠ '+t); Sound.play('warn'); }
function showOverlay(title,body,cb,btn){ document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovBody').innerHTML=body; const o=document.getElementById('overlay'); o.style.display='flex';
  const b=document.getElementById('ovBtn'); b.textContent=btn||'继续'; b.onclick=()=>{ o.style.display='none'; cb(); }; }

document.getElementById('sound-toggle').onclick=()=>Sound.toggleMute();
Sound.updateToggleButton();
function syncThemeIcon(){ document.getElementById('theme-toggle').textContent = Theme.get()==='A' ? '毡' : '墨'; }
document.getElementById('theme-toggle').onclick=()=>{ Theme.toggle(); syncThemeIcon(); };
syncThemeIcon();
function syncOrientIcon(){ document.getElementById('orient-toggle').classList.toggle('active', Orient.pref()!=='auto'); }
document.getElementById('orient-toggle').onclick=()=>{ Orient.cycle(); syncOrientIcon(); };
syncOrientIcon();
baseControls(); newGame();
</script>
