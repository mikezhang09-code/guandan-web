<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="design_doc_mode" content="canvas">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@500;700;900&family=Sora:wght@500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #0e1014; }
  .cg-scroll::-webkit-scrollbar { display: none; }
  .cg-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes cgIn { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: none; } }
  @keyframes cgPileIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes cgGlow { 0%,100% { box-shadow: 0 0 0 0 rgba(255,210,120,.0); } 50% { box-shadow: 0 0 14px 2px rgba(255,210,120,.55); } }
</style>
<script src="guandan-engine.js"></script>
<script src="shengji-engine.js"></script>
</helmet>
<section data-turn="1" style="display:flex; flex-wrap:wrap; gap:60px; padding:64px 56px 96px; align-items:flex-start; justify-content:center; min-height:100vh; background:radial-gradient(130% 90% at 50% 0%, #191d24 0%, #0e1014 60%); font-family:'Noto Sans SC',sans-serif;">
  <div id="1a" style="display:flex; flex-direction:column; gap:20px; align-items:center;">
    <div style="text-align:center; color:#EDEFF3; max-width:420px;">
      <div style="display:inline-flex; align-items:center; gap:9px; margin-bottom:10px;">
        <span style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12px; letter-spacing:.14em; color:#0b0e12; background:#E7C77E; padding:4px 10px; border-radius:20px;">1A</span>
        <span style="font-family:'Noto Serif SC',serif; font-weight:700; font-size:21px; letter-spacing:.04em;">毡影 · Feltwork</span>
      </div>
      <div style="font-size:13px; line-height:1.6; color:rgba(237,239,243,.55);">温润毡台与象牙牌面，金线点缀的沉浸桌游。点两款游戏进入试玩。</div>
    </div>
    {{ appA }}
  </div>
  <div id="1b" style="display:flex; flex-direction:column; gap:20px; align-items:center;">
    <div style="text-align:center; color:#EDEFF3; max-width:420px;">
      <div style="display:inline-flex; align-items:center; gap:9px; margin-bottom:10px;">
        <span style="font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12px; letter-spacing:.14em; color:#0b0e12; background:#2BD4A8; padding:4px 10px; border-radius:20px;">1B</span>
        <span style="font-family:'Noto Sans SC',sans-serif; font-weight:900; font-size:21px; letter-spacing:.02em;">墨玉 · Ink &amp; Jade</span>
      </div>
      <div style="font-size:13px; line-height:1.6; color:rgba(237,239,243,.55);">深墨底色配翡翠 / 钴蓝单色强调，几何粗体的现代产品感。同样可试玩。</div>
    </div>
    {{ appB }}
  </div>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { A: { screen: 'home', orient: 'portrait' }, B: { screen: 'home', orient: 'portrait' } };
    this.apps = { A: { gd: null, sj: null }, B: { gd: null, sj: null } };
    this._mounted = false;
    this.h = React.createElement;
  }
  componentDidMount() {
    this._mounted = true;
    const resume = () => { try { if (this._ac && this._ac.state === 'suspended') this._ac.resume(); } catch (e) {} };
    window.addEventListener('pointerdown', resume);
  }
  componentWillUnmount() {
    this._mounted = false;
    ['A', 'B'].forEach(d => ['gd', 'sj'].forEach(g => { const e = this.apps[d][g]; if (e && e.destroy) e.destroy(); }));
  }
  up() { if (this._mounted) this.forceUpdate(); }

  /* ---------- sound ---------- */
  ac() { if (!this._ac) { try { this._ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { this._ac = null; } } return this._ac; }
  beep(freq, dur, type, vol) {
    const ac = this.ac(); if (!ac || this._muted) return;
    try {
      const t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
      o.type = type || 'triangle'; o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(vol || 0.06, t); g.gain.exponentialRampToValueAtTime(0.0008, t + dur);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t + dur);
    } catch (e) {}
  }
  chord(freqs, step, dur, type) { freqs.forEach((f, i) => setTimeout(() => this.beep(f, dur || 0.3, type || 'sine', 0.05), i * (step || 70))); }
  sound(kind) {
    switch (kind) {
      case 'click': this.beep(560, 0.07, 'triangle', 0.05); break;
      case 'tick': this.beep(430, 0.045, 'square', 0.028); break;
      case 'play': this.beep(320, 0.1, 'triangle', 0.06); break;
      case 'pass': this.beep(220, 0.13, 'triangle', 0.05); break;
      case 'deal': this.chord([760, 620, 500], 55, 0.05, 'sine'); break;
      case 'declare': this.chord([520, 700], 90, 0.22, 'sine'); break;
      case 'tribute': this.chord([523, 659, 784], 80, 0.25, 'sine'); break;
      case 'win': this.chord([392, 523], 70, 0.28, 'sine'); break;
      case 'victory': this.chord([392, 440, 494, 523, 659], 90, 0.32, 'triangle'); break;
      case 'defeat': this.beep(180, 0.5, 'sawtooth', 0.06); break;
      case 'warn': this.beep(140, 0.14, 'sawtooth', 0.07); break;
    }
  }
  toggleMute() { this._muted = !this._muted; this.up(); }

  /* ---------- navigation ---------- */
  makeEngine(dir, game) {
    const opts = { onUpdate: () => this.up(), onEvent: k => this.sound(k), aiDelay: 620 };
    return game === 'guandan' ? new window.GuandanGame(opts) : new window.ShengjiGame(opts);
  }
  enter(dir, game) {
    const key = game === 'guandan' ? 'gd' : 'sj';
    const other = key === 'gd' ? 'sj' : 'gd';
    if (this.apps[dir][other] && this.apps[dir][other].destroy) { this.apps[dir][other].destroy(); this.apps[dir][other] = null; }
    if (this.apps[dir][key] && this.apps[dir][key].destroy) this.apps[dir][key].destroy();
    this.apps[dir][key] = this.makeEngine(dir, game);
    this.apps[dir][key].newGame();
    this.setState(s => ({ [dir]: { ...s[dir], screen: game } }));
  }
  goHome(dir) {
    ['gd', 'sj'].forEach(g => { const e = this.apps[dir][g]; if (e && e.destroy) e.destroy(); this.apps[dir][g] = null; });
    this.setState(s => ({ [dir]: { ...s[dir], screen: 'home' } }));
  }
  rotate(dir) { this.setState(s => ({ [dir]: { ...s[dir], orient: s[dir].orient === 'portrait' ? 'landscape' : 'portrait' } })); }
  activeEngine(dir) { const sc = this.state[dir].screen; return sc === 'guandan' ? this.apps[dir].gd : sc === 'shengji' ? this.apps[dir].sj : null; }

  /* ---------- theme ---------- */
  theme(dir, game) {
    const feltGD = 'radial-gradient(125% 92% at 50% 20%, #2f875d 0%, #17603e 46%, #0a3623 100%)';
    const feltSJ = 'radial-gradient(125% 92% at 50% 20%, #327089 0%, #1c455c 46%, #0b2637 100%)';
    if (dir === 'A') {
      const felt = game === 'shengji' ? feltSJ : game === 'guandan' ? feltGD : 'radial-gradient(125% 92% at 50% 24%, #276244 0%, #123c29 55%, #0a251b 100%)';
      return {
        dir: 'A', game, screenBg: felt,
        accent: '#E7C77E', accentDeep: '#C9A65A', accentSoft: 'rgba(231,199,126,.16)',
        ink: '#FBF5E8', sub: 'rgba(251,245,232,.68)',
        cardFace: '#FBF6EA', cardRed: '#BE3B2E', cardBlack: '#2C353D', cardEdge: 'rgba(30,20,0,.22)', cardRadius: 12,
        panel: 'rgba(9,26,18,.5)', panelEdge: 'rgba(231,199,126,.3)',
        font: "'Noto Serif SC', serif", body: "'Noto Sans SC', sans-serif", rankFont: "'Noto Serif SC', serif",
        chipBg: 'rgba(0,0,0,.34)', turnBg: '#E7C77E', turnInk: '#2a3320', btnRadius: 22,
        trumpFace: '#FCF3D3', trumpEdge: 'rgba(190,140,20,.55)', pointDot: '#0E9C7E'
      };
    }
    const jade = '#2BD4A8', cobalt = '#5B9CFF';
    const ac = game === 'shengji' ? cobalt : jade;
    return {
      dir: 'B', game, screenBg: game === 'shengji' ? 'radial-gradient(130% 80% at 50% 0%, #141a24 0%, #0f1216 60%)' : 'radial-gradient(130% 80% at 50% 0%, #131c19 0%, #0f1216 60%)',
      accent: ac, accentDeep: ac, accentSoft: ac + '22',
      ink: '#EDEFF3', sub: 'rgba(237,239,243,.5)',
      cardFace: '#F5F6F8', cardRed: '#E5484D', cardBlack: '#181C24', cardEdge: 'rgba(0,0,0,.14)', cardRadius: 9,
      panel: '#181B21', panelEdge: 'rgba(255,255,255,.09)',
      font: "'Noto Sans SC', sans-serif", body: "'Noto Sans SC', sans-serif", rankFont: "'Space Grotesk','Sora',sans-serif",
      chipBg: 'rgba(255,255,255,.06)', turnBg: ac, turnInk: '#0b0e12', btnRadius: 12,
      trumpFace: '#F5F6F8', trumpEdge: ac, pointDot: ac
    };
  }

  dims(orient) {
    return orient === 'portrait'
      ? { ow: 398, oh: 812, bez: 13, isW: 116, isH: 30 }
      : { ow: 812, oh: 398, bez: 13, isW: 30, isH: 116 };
  }

  /* ---------- primitives ---------- */
  btn(th, label, o) {
    o = o || {};
    const primary = o.kind === 'primary';
    const style = {
      fontFamily: th.font, fontWeight: 700, fontSize: o.small ? 12.5 : 13.5,
      padding: o.small ? '7px 12px' : '9px 15px', borderRadius: th.btnRadius,
      border: primary ? 'none' : `1px solid ${th.panelEdge}`,
      background: primary ? th.turnBg : 'rgba(255,255,255,.05)',
      color: primary ? th.turnInk : th.ink,
      opacity: o.disabled ? 0.36 : 1, cursor: o.disabled ? 'default' : 'pointer',
      whiteSpace: 'nowrap', flex: '0 0 auto', letterSpacing: '.02em',
      boxShadow: primary && !o.disabled ? `0 4px 12px -3px ${th.accent}88` : 'none',
      transition: 'transform .1s', userSelect: 'none'
    };
    return this.h('button', { key: o.key, style, onClick: o.disabled ? null : o.onClick }, label);
  }

  card(th, m, o) {
    o = o || {};
    const w = o.w, ht = o.h, mini = o.mini;
    const isTrump = m.trump;
    const style = {
      key: m.id, position: 'relative', width: w, height: ht, flex: '0 0 auto',
      borderRadius: th.cardRadius,
      background: (isTrump && th.dir === 'A') ? th.trumpFace : th.cardFace,
      color: m.red ? th.cardRed : th.cardBlack,
      border: `1px solid ${(isTrump && th.dir === 'A') ? th.trumpEdge : th.cardEdge}`,
      display: 'flex', flexDirection: 'column', alignItems: 'flex-start', justifyContent: 'flex-start',
      padding: mini ? '3px 0 0 4px' : '5px 0 0 6px',
      fontFamily: th.rankFont, fontWeight: 700,
      boxShadow: o.sel ? `0 12px 22px -8px ${th.accent}, 0 0 0 2px ${th.accent}` : '0 2px 5px rgba(0,0,0,.4)',
      transform: o.sel ? `translateY(${o.lift || -18}px)` : 'none',
      transition: 'transform .12s, box-shadow .12s',
      cursor: o.onClick ? 'pointer' : 'default',
      marginLeft: o.overlap != null ? o.overlap : 0
    };
    const kids = [];
    kids.push(this.h('div', { key: 'r', style: { fontSize: mini ? 12 : (m.joker ? 13 : 16), lineHeight: 1 } }, m.rank));
    kids.push(this.h('div', { key: 's', style: { fontSize: mini ? 11 : 14, lineHeight: 1.05 } }, m.suitSym));
    if (!mini) kids.push(this.h('div', { key: 'bg', style: { position: 'absolute', right: 4, bottom: 2, fontSize: ht * 0.42, lineHeight: 1, opacity: 0.1, fontWeight: 700 } }, m.suitSym));
    if (isTrump && th.dir === 'B') kids.push(this.h('div', { key: 'tb', style: { position: 'absolute', left: 0, top: 4, bottom: 4, width: 3, borderRadius: 3, background: th.accent } }));
    if (m.point) kids.push(this.h('div', { key: 'pt', style: { position: 'absolute', top: 4, right: 4, width: 6, height: 6, borderRadius: 6, background: th.pointDot } }));
    if (m.wild) kids.push(this.h('div', { key: 'wd', style: { position: 'absolute', bottom: 3, left: '50%', transform: 'translateX(-50%)', fontSize: 8, fontWeight: 500, fontFamily: th.body, color: '#fff', background: '#BE3B2E', borderRadius: 3, padding: '0 3px', letterSpacing: '.05em' } }, '百搭'));
    return this.h('div', { key: m.id, style, onClick: o.onClick }, kids);
  }

  pile(th, cards, o) {
    o = o || {};
    if (cards === 'pass') {
      return this.h('div', { style: { fontFamily: th.font, fontSize: 12, fontWeight: 700, color: th.sub, background: th.chipBg, padding: '3px 9px', borderRadius: 10, animation: 'cgPileIn .2s ease' } }, '不出');
    }
    if (!cards || !cards.length) return null;
    const cw = 26, chh = 37;
    const kids = cards.map((m, i) => this.card(th, m, { w: cw, h: chh, mini: true, overlap: i === 0 ? 0 : -13 }));
    const glow = o.win ? `drop-shadow(0 0 9px ${th.accent}) drop-shadow(0 0 3px ${th.accent})` : (o.leading ? `drop-shadow(0 0 6px ${th.accent})` : 'none');
    return this.h('div', { style: { display: 'flex', animation: 'cgPileIn .22s ease', filter: glow, transition: 'filter .15s' } }, kids);
  }

  seatChip(th, p, style, decl) {
    const kids = [];
    const nameStyle = {
      fontFamily: th.font, fontSize: 12, fontWeight: 700, padding: '3px 10px', borderRadius: 11,
      background: p.isTurn ? th.turnBg : th.chipBg, color: p.isTurn ? th.turnInk : th.ink,
      display: 'inline-flex', alignItems: 'center', gap: 4,
      boxShadow: p.isTurn ? `0 0 12px ${th.accent}` : 'none', whiteSpace: 'nowrap'
    };
    kids.push(this.h('div', { key: 'n', style: nameStyle }, p.name + (p.isDealer ? ' · 庄' : '')));
    if (p.count != null) kids.push(this.h('div', { key: 'c', style: { fontFamily: th.body, fontSize: 10.5, color: th.sub, marginTop: 3 } }, '剩 ' + p.count + (p.finished ? ' ✔' : '')));
    if (decl) kids.push(this.h('div', { key: 'd', style: { marginTop: 4, fontFamily: th.body, fontSize: 10.5, fontWeight: 700, color: decl.red ? th.cardRed : th.accent, background: 'rgba(0,0,0,.4)', border: `1px solid ${th.accent}`, borderRadius: 9, padding: '2px 8px', display: 'inline-flex', gap: 3, alignItems: 'center', boxShadow: `0 0 8px ${th.accent}66` } }, '主', this.h('span', { key: 's', style: { fontSize: 13 } }, decl.sym)));
    return this.h('div', { style: { position: 'absolute', textAlign: 'center', zIndex: 4, ...style } }, kids);
  }

  renderSuitPalette(th, v, eng) {
    if (!v.suitPalette || !v.suitPalette.length) return null;
    const any = v.suitPalette.some(s => s.available);
    const chips = v.suitPalette.map(s => {
      const active = v.declarerSeatIdx === 0 && v.trumpSuit === s.suit;
      const col = s.red ? th.cardRed : (s.suit === 'NT' ? th.accentDeep : th.cardBlack);
      const topLabel = s.suit === 'NT' ? '无主' : v.levelText;
      const subLabel = !s.available ? '—' : (active ? '已亮' : s.suit === 'NT' ? (s.strength >= 4 ? '大王' : '小王') : (v.declaration ? '反主' : (s.strength >= 2 ? '对' : '亮')));
      return this.h('button', {
        key: s.suit, disabled: !s.available, onClick: s.available ? () => eng.humanDeclare(s.suit, s.strength) : null,
        style: {
          width: 46, height: 58, borderRadius: 10, flex: '0 0 auto', padding: 0,
          border: active ? `2px solid ${th.accent}` : `1px solid ${s.available ? th.panelEdge : 'rgba(255,255,255,.05)'}`,
          background: s.available ? (th.dir === 'A' ? th.cardFace : '#F5F6F8') : 'rgba(255,255,255,.03)',
          color: s.available ? col : 'rgba(255,255,255,.22)', opacity: s.available ? 1 : 0.5,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 1,
          cursor: s.available ? 'pointer' : 'default', fontFamily: th.rankFont,
          boxShadow: s.available ? (active ? `0 0 14px ${th.accent}` : '0 2px 6px rgba(0,0,0,.35)') : 'none',
          animation: s.available && !active ? 'cgGlow 1.5s ease-in-out infinite' : 'none'
        }
      },
        this.h('div', { key: 'r', style: { fontSize: 12, fontWeight: 700, lineHeight: 1 } }, topLabel),
        this.h('div', { key: 's', style: { fontSize: 22, lineHeight: 1 } }, s.sym),
        this.h('div', { key: 'l', style: { fontSize: 8, fontFamily: th.body, fontWeight: 600, color: s.available ? (v.declaration && !active ? th.cardRed : th.sub) : 'transparent', letterSpacing: '.04em' } }, subLabel));
    });
    const hint = this.h('div', { key: 'h', style: { fontFamily: th.body, fontSize: 10.5, color: any ? th.accent : th.sub, textAlign: 'center', marginBottom: 5, letterSpacing: '.05em', fontWeight: any ? 700 : 400 } }, any ? '点亮花色抢主 ▾' : '摸到级牌 / 王对即可亮主');
    return this.h('div', { style: { flex: '0 0 auto', padding: '6px 12px 0' } }, hint, this.h('div', { style: { display: 'flex', gap: 8, justifyContent: 'center' } }, chips));
  }

  statusBar(th) {
    return this.h('div', { style: { height: 26, flex: '0 0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 22px', color: th.ink, fontFamily: th.rankFont, fontSize: 12.5, fontWeight: 700 } },
      this.h('span', { key: 't' }, '9:41'),
      this.h('span', { key: 'r', style: { fontSize: 11, letterSpacing: '1px' } }, '5G  ◗'));
  }

  header(th, dir, title, right) {
    const iconBtn = (label, onClick, key) => this.h('button', { key, onClick, style: { border: 'none', background: th.chipBg, color: th.ink, width: 30, height: 30, borderRadius: 9, fontSize: 15, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flex: '0 0 auto', fontFamily: th.body } }, label);
    return this.h('div', { style: { flex: '0 0 auto', display: 'flex', alignItems: 'center', gap: 8, padding: '4px 14px 6px' } },
      iconBtn('‹', () => this.goHome(dir), 'home'),
      iconBtn('⟳', () => this.rotate(dir), 'rot'),
      iconBtn(this._muted ? '🔇' : '🔊', () => this.toggleMute(), 'snd'),
      this.h('div', { key: 'ttl', style: { flex: 1, textAlign: 'center', fontFamily: th.font, fontWeight: th.dir === 'A' ? 700 : 900, fontSize: 15, color: th.ink, letterSpacing: '.04em' } }, title),
      this.h('div', { key: 'rt', style: { flex: '0 0 auto', display: 'flex', gap: 6, alignItems: 'center' } }, right || null));
  }

  statChip(th, label, val, key) {
    return this.h('div', { key, style: { display: 'flex', flexDirection: 'column', alignItems: 'center', lineHeight: 1.1 } },
      this.h('div', { key: 'l', style: { fontFamily: th.body, fontSize: 8.5, color: th.sub, letterSpacing: '.08em' } }, label),
      this.h('div', { key: 'v', style: { fontFamily: th.rankFont, fontSize: 13, fontWeight: 700, color: th.accent } }, val));
  }

  infoLine(th, text) {
    return this.h('div', { style: { flex: '0 0 auto', textAlign: 'center', padding: '2px 12px 4px', fontFamily: th.body, fontSize: 11.5, color: th.sub, minHeight: 18 } }, text);
  }

  /* ---------- hand + controls ---------- */
  handRow(th, hand, orient, onCard) {
    const wrap = th.dir === 'B' && orient === 'portrait';
    const cw = orient === 'portrait' ? 44 : 40, chh = orient === 'portrait' ? 64 : 58;
    const overlap = wrap ? -16 : -20;
    const cards = hand.map((m, i) => this.card(th, m, {
      w: cw, h: chh, sel: m.sel, lift: -16, overlap: (i === 0 || (wrap && false)) ? 0 : overlap,
      onClick: onCard ? () => onCard(m.id) : null
    }));
    return this.h('div', {
      className: 'cg-scroll',
      style: {
        display: 'flex', flexWrap: wrap ? 'wrap' : 'nowrap', justifyContent: 'center',
        alignItems: 'flex-end', gap: wrap ? '18px 0' : 0, rowGap: wrap ? 20 : 0,
        padding: '20px 12px 4px', overflowX: wrap ? 'hidden' : 'auto', overflowY: 'visible',
        maxHeight: wrap ? 172 : 'none'
      }
    }, cards);
  }

  controlsBar(th, buttons) {
    return this.h('div', { style: { flex: '0 0 auto', display: 'flex', flexWrap: 'wrap', gap: 8, justifyContent: 'center', padding: '4px 12px 14px' } }, buttons);
  }

  /* ---------- overlay ---------- */
  overlay(th, ov, onContinue) {
    if (!ov) return null;
    const lines = String(ov.body).split('\n').map((l, i) => this.h('div', { key: i, style: { margin: '3px 0' } }, l));
    return this.h('div', { style: { position: 'absolute', inset: 0, zIndex: 30, background: 'rgba(6,10,14,.74)', backdropFilter: 'blur(3px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 26 } },
      this.h('div', { style: { width: '100%', maxWidth: 320, background: th.panel, border: `1px solid ${th.panelEdge}`, borderRadius: 20, padding: '24px 22px', textAlign: 'center', boxShadow: '0 20px 50px rgba(0,0,0,.5)', animation: 'cgIn .25s ease' } },
        this.h('div', { key: 'ti', style: { fontFamily: th.font, fontWeight: th.dir === 'A' ? 900 : 800, fontSize: 19, color: th.ink, marginBottom: 12 } }, ov.title),
        this.h('div', { key: 'bd', style: { fontFamily: th.body, fontSize: 12.5, color: th.sub, lineHeight: 1.55 } }, lines),
        this.h('div', { key: 'bt', style: { marginTop: 18 } }, this.btn(th, ov.btn, { kind: 'primary', onClick: onContinue }))));
  }

  /* ---------- board ---------- */
  renderBoard(dir, game, v) {
    const th = this.theme(dir, game);
    const orient = this.state[dir].orient;
    const eng = this.activeEngine(dir);
    if (!v) return this.h('div', { style: { flex: 1 } });

    // seats + piles positions (percentages, work for both orientations)
    const land = orient === 'landscape';
    const seatPos = { 1: { top: '37%', left: land ? 46 : 6, transform: 'translateY(-50%)' }, 2: { top: 4, left: '50%', transform: 'translateX(-50%)' }, 3: { top: '37%', right: 6, transform: 'translateY(-50%)' } };
    const pilePos = {
      1: { top: '46%', left: '11%', transform: 'translateY(-50%)' },
      2: { top: '20%', left: '50%', transform: 'translate(-50%,0)' },
      3: { top: '46%', right: '11%', transform: 'translateY(-50%)' },
      0: { bottom: '4%', left: '50%', transform: 'translateX(-50%)' }
    };

    const seatEls = [1, 2, 3].map(i => this.seatChip(th, v.players[i], seatPos[i], (game === 'shengji' && v.players[i].declared) ? { sym: v.declSuitSym, red: v.declSuitRed } : null));
    const pileEls = [];
    v.players.forEach(p => {
      const cards = p.lastShown;
      if (!cards) return;
      let badge = null;
      if (p.win) {
        badge = this.h('div', { key: 'b', style: { fontFamily: th.body, fontSize: 10, fontWeight: 700, color: th.turnInk, background: th.turnBg, borderRadius: 9, padding: '2px 8px', marginTop: 5, whiteSpace: 'nowrap', boxShadow: `0 0 12px ${th.accent}`, animation: 'cgIn .2s ease' } }, '赢墩' + (v.lastTrickPts ? ' +' + v.lastTrickPts : ''));
      } else if (p.leading && cards !== 'pass') {
        badge = this.h('div', { key: 'b', style: { fontFamily: th.body, fontSize: 9.5, fontWeight: 700, color: th.accent, background: 'rgba(0,0,0,.3)', border: `1px solid ${th.accent}`, borderRadius: 9, padding: '1px 7px', marginTop: 5, whiteSpace: 'nowrap' } }, '当前最大');
      }
      pileEls.push(this.h('div', { key: 'pile' + p.idx, style: { position: 'absolute', zIndex: 3, display: 'flex', flexDirection: 'column', alignItems: 'center', ...pilePos[p.idx] } },
        this.pile(th, cards, { win: p.win, leading: p.leading }), badge));
    });

    // center element
    let center = null;
    if (game === 'shengji' && v.phase === 'play') {
      const def = v.defPoints;
      center = this.h('div', { style: { position: 'absolute', top: '46%', left: '50%', transform: 'translate(-50%,-50%)', zIndex: 2, textAlign: 'center', pointerEvents: 'none' } },
        this.h('div', { key: 'l', style: { fontFamily: th.body, fontSize: 9, color: th.sub, letterSpacing: '.1em' } }, '闲家得分'),
        this.h('div', { key: 'v', style: { fontFamily: th.rankFont, fontWeight: 700, fontSize: 22, color: th.accent } }, def),
        this.h('div', { key: 'b', style: { width: 78, height: 4, borderRadius: 4, background: 'rgba(255,255,255,.12)', margin: '4px auto 0', overflow: 'hidden' } },
          this.h('div', { style: { width: Math.min(100, def / 80 * 100) + '%', height: '100%', background: th.accent } })));
    } else if (game === 'shengji' && (v.phase === 'deal' || v.phase === 'declare')) {
      const dealing = v.phase === 'deal';
      const pct = Math.round((v.dealt / v.dealTotal) * 100);
      const sym = v.declaration ? v.declaration.suitName : (dealing ? '发牌' : '抢主');
      center = this.h('div', { style: { position: 'absolute', top: '45%', left: '50%', transform: 'translate(-50%,-50%)', zIndex: 2, textAlign: 'center', pointerEvents: 'none' } },
        this.h('div', { key: 'ring', style: { width: 66, height: 66, margin: '0 auto', borderRadius: '50%', border: `2px solid ${th.accentSoft}`, display: 'flex', alignItems: 'center', justifyContent: 'center', animation: dealing ? 'cgGlow 1.1s ease-in-out infinite' : 'none', boxShadow: v.declaration ? `0 0 16px ${th.accent}` : 'none' } },
          this.h('div', { style: { fontFamily: th.font, fontWeight: 900, fontSize: v.declaration ? 15 : 17, color: v.declaration ? th.accent : th.ink, letterSpacing: '.04em' } }, sym)),
        this.h('div', { key: 'l', style: { fontFamily: th.body, fontSize: 10, color: th.sub, marginTop: 7, letterSpacing: '.08em' } }, dealing ? ('发牌 ' + v.dealt + '/' + v.dealTotal) : (v.declaration ? v.declaration.name + ' 亮主' : '无人亮主')),
        this.h('div', { key: 'b', style: { width: 88, height: 3, borderRadius: 3, background: 'rgba(255,255,255,.12)', margin: '6px auto 0', overflow: 'hidden' } },
          this.h('div', { style: { width: (dealing ? pct : 100) + '%', height: '100%', background: th.accent, transition: 'width .13s linear' } })));
    } else if (!v.needBeat && game === 'guandan' && !v.gameOver) {
      center = this.h('div', { style: { position: 'absolute', top: '44%', left: '50%', transform: 'translate(-50%,-50%)', zIndex: 1, fontFamily: th.font, fontSize: 34, fontWeight: 700, color: 'rgba(255,255,255,.06)', pointerEvents: 'none' } }, '掼蛋');
    }

    // header right stats
    let right, title, info;
    if (game === 'guandan') {
      title = '掼蛋';
      right = [this.statChip(th, '你方', v.teamLevels[0], 'a'), this.statChip(th, '对方', v.teamLevels[1], 'b')];
      const turn = v.gameOver ? '' : (v.currentName === '你' ? ' · 轮到你出牌' : ' · 轮到' + v.currentName);
      info = '级牌 ' + v.level + (v.returnMode ? ' · 请选一张 ≤10 还贡' : (v.needBeat ? ' · 需压：' + v.needBeat : ' · 自由出牌')) + turn;
    } else {
      title = '升级·拖拉机';
      right = [this.statChip(th, '主牌', v.trumpName, 'a'), this.statChip(th, '打', v.levelText, 'b')];
      if (v.phase === 'deal') info = '发牌中 ' + v.dealt + '/' + v.dealTotal + ' · ' + (v.declaration ? v.declaration.name + '亮' + v.declaration.suitName + '，可反主' : '摸到级牌/王对即可亮主');
      else if (v.phase === 'declare') info = '抢主收官 · 剩 ' + v.declareLeft + ' 秒' + (v.declaration ? ' · 当前 ' + v.declaration.suitName + '（' + v.declaration.name + '）' : ' · 无人亮主');
      else if (v.phase === 'bury') info = v.dealerMine ? '你是庄家，请埋 8 张底牌' : v.dealerName + ' 埋底中…';
      else { const act = v.players.find(p => p.isTurn); const t = v.gameOver ? '' : (act ? (act.idx === 0 ? ' · 轮到你' : ' · 轮到' + act.name) : ' · 本墩结算中…'); info = '庄家 ' + v.dealerName + ' · 闲家 ' + v.defPoints + '/80' + t; }
    }

    // controls
    let buttons = [];
    if (game === 'guandan') {
      buttons = [
        this.btn(th, v.returnMode ? '还贡' : '出牌', { key: 'p', kind: 'primary', disabled: !v.canPlay, onClick: () => eng.play() }),
        this.btn(th, '不出', { key: 'q', disabled: !v.canPass, onClick: () => eng.pass() }),
        this.btn(th, '提示', { key: 'h', disabled: v.gameOver, onClick: () => eng.hint() }),
        this.btn(th, '理牌', { key: 's', disabled: v.gameOver, onClick: () => eng.sort() })
      ];
    } else {
      if (v.phase === 'deal' || v.phase === 'declare') {
        buttons = [];
        if (v.phase === 'deal') buttons.push(this.btn(th, '跳过发牌 »', { key: 'skip', onClick: () => eng.skipDeal() }));
        else buttons.push(this.btn(th, v.declaration ? (v.declMine ? '开始（你亮主）' : '看好了，开始') : '不亮，开始', { key: 'go', kind: 'primary', onClick: () => eng.confirmDeclare() }));
      } else if (v.phase === 'bury') {
        if (v.dealerMine) buttons = [
          this.btn(th, '埋底 ' + (v.burySel || 0) + '/8', { key: 'b', kind: 'primary', disabled: v.burySel !== 8, onClick: () => eng.play() }),
          this.btn(th, '提示', { key: 'h', onClick: () => eng.hint() }),
          this.btn(th, '理牌', { key: 's', onClick: () => eng.sort() })
        ];
      } else {
        buttons = [
          this.btn(th, '出牌', { key: 'p', kind: 'primary', disabled: !v.canPlay, onClick: () => eng.play() }),
          this.btn(th, '提示', { key: 'h', disabled: v.gameOver, onClick: () => eng.hint() }),
          this.btn(th, '理牌', { key: 's', disabled: v.gameOver, onClick: () => eng.sort() })
        ];
      }
    }

    let flash = null;
    if (game === 'shengji' && v.declFlash) {
      const f = v.declFlash;
      const fpos = { 0: { bottom: '23%', left: '50%', transform: 'translate(-50%,0)' }, 1: { top: '40%', left: '19%', transform: 'translate(0,-50%)' }, 2: { top: '14%', left: '50%', transform: 'translate(-50%,0)' }, 3: { top: '40%', right: '19%', transform: 'translate(0,-50%)' } }[f.seat] || { top: '30%', left: '50%', transform: 'translate(-50%,-50%)' };
      const suitCol = f.suit === 'H' || f.suit === 'D' ? th.cardRed : (f.suit === 'NT' ? th.accent : th.ink);
      flash = this.h('div', { key: 'flash', style: { position: 'absolute', zIndex: 20, pointerEvents: 'none', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, animation: 'cgIn .25s ease', ...fpos } },
        this.h('div', { key: 't', style: { fontFamily: th.body, fontSize: 11, letterSpacing: '.14em', color: th.ink } }, f.me ? '你' : f.name),
        this.h('div', { key: 'a', style: { fontFamily: th.font, fontWeight: 900, fontSize: 25, color: f.counter ? th.cardRed : th.accent, textShadow: '0 2px 12px rgba(0,0,0,.7)', letterSpacing: '.06em' } }, f.action),
        this.h('div', { key: 's', style: { fontFamily: th.font, fontWeight: 700, fontSize: 17, color: suitCol, background: 'rgba(0,0,0,.5)', border: `1px solid ${th.accent}`, borderRadius: 12, padding: '4px 14px', boxShadow: `0 0 14px ${th.accent}88` } }, f.suitName));
    }
    const table = this.h('div', { style: { position: 'relative', flex: 1, minHeight: 0 } }, seatEls, center, pileEls, flash);
    const paletteEl = (game === 'shengji' && (v.phase === 'deal' || v.phase === 'declare')) ? this.renderSuitPalette(th, v, eng) : null;
    const handSection = this.h('div', { style: { flex: '0 0 auto', background: 'linear-gradient(to top, rgba(0,0,0,.4), transparent)' } },
      paletteEl,
      this.handRow(th, v.hand, orient, id => eng.toggle(id)),
      this.controlsBar(th, buttons));

    return this.h('div', { style: { position: 'relative', display: 'flex', flexDirection: 'column', height: '100%', background: th.screenBg } },
      this.statusBar(th),
      this.header(th, dir, title, right),
      this.infoLine(th, info),
      table,
      handSection,
      this.overlay(th, v.overlay, () => eng.overlayContinue()));
  }

  /* ---------- home ---------- */
  homeCard(th, dir, game, orient) {
    const gd = game === 'guandan';
    const accent = th.dir === 'A' ? (gd ? '#8FE3B4' : '#8FD0E3') : (gd ? '#2BD4A8' : '#5B9CFF');
    const title = gd ? '掼蛋' : '升级 · 拖拉机';
    const tag = gd ? '江淮流行 · 先出完牌' : '经典 80 分 · 抓分上台';
    const desc = gd ? '两副牌 4 人 2 队，级牌 · 红桃百搭 · 炸弹 · 进贡还贡。' : '叫主埋底，连对拖拉机，闲家抢够 80 分上台。';
    if (th.dir === 'A') {
      return this.h('div', {
        key: game, onClick: () => this.enter(dir, game),
        style: {
          flex: 1, cursor: 'pointer', borderRadius: 18, padding: '20px 20px 18px',
          background: gd ? 'linear-gradient(150deg, rgba(46,132,90,.55), rgba(12,54,35,.5))' : 'linear-gradient(150deg, rgba(50,112,137,.55), rgba(11,54,72,.5))',
          border: `1px solid ${th.panelEdge}`, boxShadow: '0 10px 26px rgba(0,0,0,.35)', color: th.ink, position: 'relative', overflow: 'hidden'
        }
      },
        this.h('div', { key: 's', style: { position: 'absolute', right: 12, top: 6, fontSize: 60, opacity: 0.12, fontFamily: th.rankFont } }, gd ? '♠' : '♦'),
        this.h('div', { key: 't', style: { fontFamily: th.font, fontWeight: 900, fontSize: 30, letterSpacing: '.05em' } }, title),
        this.h('div', { key: 'g', style: { fontFamily: th.body, fontSize: 12, color: th.accent, margin: '4px 0 8px', fontWeight: 700 } }, tag),
        this.h('div', { key: 'd', style: { fontFamily: th.body, fontSize: 12, color: th.sub, lineHeight: 1.6, maxWidth: 220 } }, desc),
        this.h('div', { key: 'e', style: { marginTop: 14, display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: th.body, fontSize: 12.5, fontWeight: 700, color: th.turnInk, background: th.accent, padding: '7px 14px', borderRadius: 20 } }, '进入牌局 ›'));
    }
    // B
    return this.h('div', {
      key: game, onClick: () => this.enter(dir, game),
      style: {
        flex: 1, cursor: 'pointer', borderRadius: 16, padding: '22px 20px 20px', background: th.panel,
        border: `1px solid ${th.panelEdge}`, borderLeft: `3px solid ${accent}`, color: th.ink, position: 'relative', overflow: 'hidden'
      }
    },
      this.h('div', { key: 'n', style: { fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 13, color: accent, letterSpacing: '.1em' } }, gd ? '01' : '02'),
      this.h('div', { key: 't', style: { fontFamily: th.font, fontWeight: 900, fontSize: 26, margin: '6px 0 4px', letterSpacing: '.01em' } }, title),
      this.h('div', { key: 'g', style: { fontFamily: th.body, fontSize: 11.5, color: th.sub, fontWeight: 600, letterSpacing: '.04em' } }, tag),
      this.h('div', { key: 'd', style: { fontFamily: th.body, fontSize: 12, color: th.sub, lineHeight: 1.6, margin: '12px 0 0', maxWidth: 230 } }, desc),
      this.h('div', { key: 'e', style: { marginTop: 16, fontFamily: "'Space Grotesk',sans-serif", fontSize: 13, fontWeight: 700, color: accent } }, '开始 →'));
  }

  renderHome(dir) {
    const th = this.theme(dir, 'home');
    const orient = this.state[dir].orient;
    const iconBtn = (label, onClick, key) => this.h('button', { key, onClick, style: { border: 'none', background: th.chipBg, color: th.ink, width: 30, height: 30, borderRadius: 9, fontSize: 14, cursor: 'pointer', flex: '0 0 auto' } }, label);
    const header = this.h('div', { style: { flex: '0 0 auto', display: 'flex', justifyContent: 'flex-end', gap: 8, padding: '4px 14px 0' } }, iconBtn('⟳', () => this.rotate(dir), 'r'), iconBtn(this._muted ? '🔇' : '🔊', () => this.toggleMute(), 's'));
    const titleBlock = this.h('div', { style: { textAlign: th.dir === 'A' ? 'center' : 'left', padding: th.dir === 'A' ? '10px 24px 6px' : '14px 24px 6px', flex: '0 0 auto' } },
      this.h('div', { key: 'k', style: { fontFamily: th.body, fontSize: 11, letterSpacing: '.24em', color: th.sub, marginBottom: 6 } }, th.dir === 'A' ? '两副牌 · 4 人对战' : 'CARD TABLE'),
      this.h('div', { key: 't', style: { fontFamily: th.font, fontWeight: 900, fontSize: th.dir === 'A' ? 34 : 40, color: th.ink, letterSpacing: '.03em', lineHeight: 1.05 } }, '扑克牌桌'),
      th.dir === 'A' ? this.h('div', { key: 's', style: { fontFamily: th.body, fontSize: 12, color: th.sub, marginTop: 6 } }, '纯本地 · 无需联网 · 一人对三 AI') : null);
    const cardsWrap = this.h('div', {
      className: 'cg-scroll',
      style: { flex: 1, minHeight: 0, overflowY: 'auto', display: 'flex', flexDirection: orient === 'landscape' ? 'row' : 'column', gap: 16, padding: '10px 22px 22px', alignItems: orient === 'landscape' ? 'stretch' : 'stretch' }
    }, this.homeCard(th, dir, 'guandan', orient), this.homeCard(th, dir, 'shengji', orient));
    const foot = this.h('div', { style: { flex: '0 0 auto', textAlign: 'center', padding: '0 0 16px', fontFamily: th.body, fontSize: 11, color: th.sub } }, '📖 点游戏卡片进入 · 可试玩');
    return this.h('div', { style: { display: 'flex', flexDirection: 'column', height: '100%', background: th.screenBg } },
      this.statusBar(th), header, titleBlock, cardsWrap, foot);
  }

  /* ---------- frame ---------- */
  renderFrame(dir, orient, screen) {
    const d = this.dims(orient);
    const island = orient === 'portrait'
      ? { position: 'absolute', top: 9, left: '50%', transform: 'translateX(-50%)', width: d.isW, height: d.isH, borderRadius: 18, background: '#000', zIndex: 50 }
      : { position: 'absolute', left: 9, top: '50%', transform: 'translateY(-50%)', width: d.isW, height: d.isH, borderRadius: 18, background: '#000', zIndex: 50 };
    return this.h('div', {
      style: {
        width: d.ow, height: d.oh, borderRadius: 54, padding: d.bez, flex: '0 0 auto',
        background: 'linear-gradient(155deg, #2a2d33, #0c0d10 60%)',
        boxShadow: '0 30px 70px -20px rgba(0,0,0,.8), inset 0 0 0 2px rgba(255,255,255,.05)', position: 'relative'
      }
    },
      this.h('div', { key: 'isl', style: island }),
      this.h('div', { key: 'scr', style: { width: '100%', height: '100%', borderRadius: 42, overflow: 'hidden', position: 'relative', background: '#0c1116' } }, screen));
  }

  renderApp(dir) {
    const s = this.state[dir];
    let screen;
    if (s.screen === 'home') screen = this.renderHome(dir);
    else screen = this.renderBoard(dir, s.screen, this.activeEngine(dir) ? this.activeEngine(dir).view() : null);
    return this.renderFrame(dir, s.orient, screen);
  }

  renderVals() {
    return { appA: this.renderApp('A'), appB: this.renderApp('B') };
  }
}
</script>
</body>
</html>
