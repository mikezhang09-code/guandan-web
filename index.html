<!DOCTYPE html>
<html lang="zh-CN" data-game="home">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>扑克牌桌 · 选择游戏</title>
<script src="theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@500;700;900&family=Sora:wght@500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
</head>
<body>
<div id="board">
  <div class="cg-home-header">
    <div class="cg-theme-switch" role="group" aria-label="视觉风格">
      <button class="segBtn" data-dir="A">毡影</button>
      <button class="segBtn" data-dir="B">墨玉</button>
    </div>
    <span class="cg-icon-btn" id="sound-toggle" role="button" aria-label="声音"></span>
  </div>
  <div class="cg-titleblock">
    <div class="cg-kicker" id="kicker"></div>
    <h1 class="cg-hometitle">扑克牌桌</h1>
    <div class="cg-homesub" id="homesub"></div>
  </div>
  <div class="cards">
    <a class="game gd" href="guandan.html">
      <span class="watermark">♠</span>
      <span class="idx">01</span>
      <h2>掼蛋</h2>
      <div class="tag">江淮流行 · 先出完牌</div>
      <p>2 副牌，4 人 2 队，比谁先出完牌。含级牌、红桃百搭、炸弹、进贡还贡，先打过 A 获胜。</p>
      <span class="cta">进入牌局 ›</span>
    </a>
    <a class="game sj" href="shengji.html">
      <span class="watermark">♦</span>
      <span class="idx">02</span>
      <h2>升级 · 拖拉机</h2>
      <div class="tag">经典 80 分 · 抓分上台</div>
      <p>2 副牌，4 人 2 队，叫主埋底，连对拖拉机。闲家抢够 80 分上台，先升过 A 获胜。</p>
      <span class="cta">开始 →</span>
    </a>
  </div>
  <div class="cg-foot">📖 不会玩？查看 <a href="help.html">规则与实例</a></div>
</div>
<script>
  var MUTE_KEY = 'game_sound_muted';
  function isMuted(){ return localStorage.getItem(MUTE_KEY) === 'true'; }
  function syncMuteUI(){ document.getElementById('sound-toggle').textContent = isMuted() ? '🔇' : '🔊'; }
  document.getElementById('sound-toggle').onclick = function(){
    localStorage.setItem(MUTE_KEY, (!isMuted()));
    syncMuteUI();
  };
  syncMuteUI();

  function syncThemeUI(){
    var dir = Theme.get();
    document.querySelectorAll('.segBtn').forEach(function(b){ b.classList.toggle('active', b.dataset.dir === dir); });
    var isA = dir === 'A';
    document.getElementById('kicker').textContent = isA ? '两副牌 · 4 人对战' : 'CARD TABLE';
    document.getElementById('homesub').textContent = isA ? '纯本地 · 无需联网 · 一人对三 AI' : '';
    document.getElementById('homesub').style.display = isA ? 'block' : 'none';
  }
  document.querySelectorAll('.segBtn').forEach(function(b){
    b.onclick = function(){ Theme.set(b.dataset.dir); syncThemeUI(); };
  });
  syncThemeUI();
</script>
</body>
</html>
