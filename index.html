<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>掼蛋 Guandan</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 35%, #2e8b57 0%, #0f5132 60%, #08361f 100%);
    color: #fff; height: 100vh; overflow: hidden; user-select: none;
  }
  #board { position: relative; width: 100%; height: 100%; }
  .seat { position: absolute; text-align: center; }
  .seat .name { font-size: 14px; font-weight: 600; padding: 2px 10px; border-radius: 12px;
    background: rgba(0,0,0,.3); display: inline-block; }
  .seat.turn .name { background: #ffcc00; color: #222; box-shadow: 0 0 12px #ffcc00; }
  .seat .count { font-size: 12px; opacity: .85; margin-top: 2px; }
  /* seats */
  #seat2 { top: 8px; left: 50%; transform: translateX(-50%); }      /* partner top */
  #seat1 { top: 38%; left: 10px; transform: translateY(-50%); }     /* left */
  #seat3 { top: 38%; right: 10px; transform: translateY(-50%); }    /* right */
  #seat0 { bottom: 150px; left: 50%; transform: translateX(-50%); display:none; }

  .played { margin-top: 4px; min-height: 56px; display: flex; justify-content: center; gap: 1px; }
  .played .mini { width: 30px; height: 44px; }
  .played .pass { font-size: 18px; color: #ffd; opacity:.9; padding-top:12px; }

  .card {
    background: #fff; color: #222; border-radius: 6px; border: 1px solid #999;
    display: inline-flex; flex-direction: column; align-items: center; justify-content: flex-start;
    font-weight: 700; position: relative; box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .card.red { color: #d40000; }
  .card .r { line-height: 1; }
  .card .s { line-height: 1; }
  .mini { width: 34px; height: 50px; font-size: 13px; padding-top:3px; }
  .mini .r { font-size: 14px; }
  .mini .s { font-size: 13px; }
  .back { background: repeating-linear-gradient(45deg,#1a3a8f,#1a3a8f 6px,#2451c4 6px,#2451c4 12px);
    border:1px solid #0b1f54; }

  #hand-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 8px 10px;
    background: linear-gradient(to top, rgba(0,0,0,.45), transparent); }
  #hand { display: flex; justify-content: center; flex-wrap: wrap; min-height: 96px; }
  #hand .card {
    width: 56px; height: 84px; font-size: 16px; margin-left: -18px; padding-top: 4px;
    transition: transform .12s; cursor: pointer;
  }
  #hand .card:first-child { margin-left: 0; }
  #hand .card .r { font-size: 18px; }
  #hand .card .s { font-size: 17px; }
  #hand .card.sel { transform: translateY(-18px); box-shadow: 0 0 8px #ffcc00; }
  #hand .card.wild::after { content:"百搭"; position:absolute; bottom:2px; font-size:8px;
    color:#fff; background:#d40000; border-radius:4px; padding:0 2px; font-weight:400; }

  #controls { display: flex; justify-content: center; gap: 10px; margin-top: 6px; align-items:center; }
  button {
    font-family: inherit; font-size: 15px; font-weight: 600; padding: 9px 18px; border: none;
    border-radius: 22px; cursor: pointer; color: #222; background: #ffd54a; box-shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  button:disabled { opacity: .4; cursor: default; }
  button.ghost { background: rgba(255,255,255,.85); }

  #status { position: absolute; top: 6px; left: 8px; font-size: 12px; line-height: 1.6;
    background: rgba(0,0,0,.35); padding: 6px 10px; border-radius: 8px; }
  #status b { color: #ffd54a; }
  #log { position: absolute; top: 6px; right: 8px; width: 160px; font-size: 11px; line-height: 1.5;
    background: rgba(0,0,0,.3); padding: 6px 8px; border-radius: 8px; max-height: 130px; overflow: hidden; }

  #overlay { position: absolute; inset: 0; background: rgba(0,0,0,.72); display: none;
    flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
  #overlay h2 { margin: 0 0 12px; }
  #overlay p { margin: 4px; font-size: 15px; }
  #center-hint { position:absolute; top:46%; left:50%; transform:translate(-50%,-50%);
    font-size:13px; opacity:.55; pointer-events:none; }
</style>
</head>
<body>
<div id="board">
  <div id="status"></div>
  <div id="log"></div>
  <div id="center-hint">掼蛋</div>

  <div class="seat" id="seat2"><span class="name">对家(队友)</span><div class="count"></div><div class="played"></div></div>
  <div class="seat" id="seat1"><span class="name">左家</span><div class="count"></div><div class="played"></div></div>
  <div class="seat" id="seat3"><span class="name">右家</span><div class="count"></div><div class="played"></div></div>
  <div class="seat" id="seat0"><div class="played"></div></div>

  <div id="hand-area">
    <div id="hand"></div>
    <div id="controls">
      <button id="btnPlay">出牌</button>
      <button id="btnPass" class="ghost">不出</button>
      <button id="btnHint" class="ghost">提示</button>
      <button id="btnSort" class="ghost">理牌</button>
      <button id="btnHelp" class="ghost">规则</button>
    </div>
  </div>

  <div id="overlay">
    <h2 id="ovTitle"></h2>
    <div id="ovBody"></div>
    <button id="ovBtn" style="margin-top:16px;">继续</button>
  </div>
</div>

<script>
/* ============================ 牌局数据 ============================ */
const SUITS = ['S','H','C','D'];           // 黑桃 红桃 梅花 方块
const SUIT_SYM = {S:'♠',H:'♥',C:'♣',D:'♦'};
const RED = new Set(['H','D']);
let uid = 0;

function makeDeck(){
  const d=[];
  for(let k=0;k<2;k++){
    for(const s of SUITS) for(let r=2;r<=14;r++) d.push({id:uid++,suit:s,rank:r,joker:null});
    d.push({id:uid++,suit:'J',rank:null,joker:'S'});
    d.push({id:uid++,suit:'J',rank:null,joker:'B'});
  }
  return d;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

/* level 是当前级牌(数字 2..14)。红桃级牌为百搭(逢人配)。 */
function isWild(c,level){ return c.suit==='H' && c.rank===level; }
function rvCard(c,level){
  if(c.joker==='B') return 17;
  if(c.joker==='S') return 16;
  if(c.rank===level) return 15;
  return c.rank;
}
function valueName(v){
  if(v===18) return '四王'; if(v===17) return '大王'; if(v===16) return '小王';
  if(v===15) return '级牌'; if(v===14) return 'A'; if(v===13) return 'K';
  if(v===12) return 'Q'; if(v===11) return 'J'; return ''+v;
}
function rankText(c){
  if(c.joker==='B') return '大王'; if(c.joker==='S') return '小王';
  return ({11:'J',12:'Q',13:'K',14:'A'})[c.rank] || ''+c.rank;
}

/* ============================ 牌型识别 ============================ */
function tryNOAK(rest,wc,level){          // n 张同点 (含百搭填充)
  if(rest.some(c=>c.joker)){
    if(wc>0) return null;
    const t=new Set(rest.map(c=>c.joker));
    if(t.size!==1) return null;
    return {value: rest[0].joker==='B'?17:16, n:rest.length};
  }
  if(rest.length===0) return {value:15,n:wc};
  const r=rest[0].rank;
  if(rest.some(c=>c.rank!==r)) return null;
  return {value: r===level?15:r, n:rest.length+wc};
}
function seqValue(rest,wc,g,nr){           // 连张: g=每点张数, nr=连续点数个数
  if(rest.length+wc !== g*nr) return null;
  if(rest.some(c=>c.joker)) return null;
  const cnt={}; rest.forEach(c=>cnt[c.rank]=(cnt[c.rank]||0)+1);
  for(let start=1; start<=15-nr; start++){
    let ok=true, inWin=0;
    for(let i=0;i<nr;i++){
      let r=start+i; let ar=(r===1)?14:r;
      let h=cnt[ar]||0;
      if(h>g){ok=false;break;}
      inWin+=h;
    }
    if(!ok) continue;
    if(inWin!==rest.length) continue;      // 有牌落在窗口外
    return start+nr-1;                      // 以顶点比大小
  }
  return null;
}
function tryFullHouse(sel,level){          // 三带二
  const rest=sel.filter(c=>!isWild(c,level)), wc=sel.length-rest.length;
  if(rest.some(c=>c.joker)) return null;
  const cnt={}; rest.forEach(c=>cnt[c.rank]=(cnt[c.rank]||0)+1);
  const cands=[...new Set([...Object.keys(cnt).map(Number),level])];
  let best=null;
  for(const tR of cands) for(const pR of cands){
    if(tR===pR) continue;
    const hT=cnt[tR]||0, hP=cnt[pR]||0;
    if(hT>3||hP>2) continue;
    if(hT+hP!==rest.length) continue;
    if((3-hT)+(2-hP)!==wc) continue;
    const v=(tR===level)?15:tR;
    if(best===null||v>best) best=v;
  }
  return best;
}
function seqOnSel(sel,level,g,nr){
  const rest=sel.filter(c=>!isWild(c,level)), wc=sel.length-rest.length;
  return seqValue(rest,wc,g,nr);
}
function tryStraightFlush(sel,level){
  const rest=sel.filter(c=>!isWild(c,level)), wc=sel.length-rest.length;
  if(rest.some(c=>c.joker)) return null;
  if(new Set(rest.map(c=>c.suit)).size>1) return null;
  return seqValue(rest,wc,1,5);
}

// 返回该组牌可表达的所有合法牌型
function evaluateSelection(sel,level){
  const rest=sel.filter(c=>!isWild(c,level)), wc=sel.length-rest.length, n=sel.length;
  const ds=[];
  const noak=tryNOAK(rest,wc,level);
  if(noak){
    if(noak.n===1) ds.push({category:'normal',type:'single',len:1,value:noak.value});
    else if(noak.n===2) ds.push({category:'normal',type:'pair',len:2,value:noak.value});
    else if(noak.n===3) ds.push({category:'normal',type:'triple',len:3,value:noak.value});
    else if(noak.n>=4) ds.push({category:'bomb',type:'bomb',len:noak.n,value:noak.value,strength:noak.n*100+noak.value});
  }
  if(n===5){
    const fh=tryFullHouse(sel,level); if(fh!=null) ds.push({category:'normal',type:'fullhouse',len:5,value:fh});
    const st=seqOnSel(sel,level,1,5); if(st!=null) ds.push({category:'normal',type:'straight',len:5,value:st});
    const sf=tryStraightFlush(sel,level); if(sf!=null) ds.push({category:'bomb',type:'straightflush',len:5,value:sf,strength:550+sf});
  }
  if(n===6){
    const tb=seqOnSel(sel,level,2,3); if(tb!=null) ds.push({category:'normal',type:'tube',len:6,value:tb});
    const pl=seqOnSel(sel,level,3,2); if(pl!=null) ds.push({category:'normal',type:'plate',len:6,value:pl});
  }
  if(n===4 && sel.every(c=>c.joker)){
    const s=sel.filter(c=>c.joker==='S').length, b=sel.filter(c=>c.joker==='B').length;
    if(s===2&&b===2) ds.push({category:'bomb',type:'fourjokers',len:4,value:18,strength:100000});
  }
  return ds;
}
function compareBeat(d,req){
  if(!req) return true;
  if(d.category==='bomb'){ if(req.category!=='bomb') return true; return d.strength>req.strength; }
  if(req.category==='bomb') return false;
  return d.type===req.type && d.len===req.len && d.value>req.value;
}
const TYPE_ORDER=['straight','tube','plate','fullhouse','triple','pair','single'];
function choosePlay(ds,req){
  if(!ds.length) return null;
  if(req){
    const norm=ds.filter(d=>d.category==='normal');
    for(const d of norm) if(compareBeat(d,req)) return d;
    const bombs=ds.filter(d=>d.category==='bomb').sort((a,b)=>a.strength-b.strength);
    for(const d of bombs) if(compareBeat(d,req)) return d;
    return null;
  }
  const norm=ds.filter(d=>d.category==='normal');
  if(norm.length){ norm.sort((a,b)=>TYPE_ORDER.indexOf(a.type)-TYPE_ORDER.indexOf(b.type)); return norm[0]; }
  return ds.filter(d=>d.category==='bomb').sort((a,b)=>a.strength-b.strength)[0]||null;
}
function descText(d){
  const m={single:'单张',pair:'对子',triple:'三张',fullhouse:'三带二',straight:'顺子',
    tube:'三连对',plate:'钢板',bomb:d.len+'炸',straightflush:'同花顺',fourjokers:'四王炸'};
  return (m[d.type]||d.type)+' '+valueName(d.value);
}

/* ============================ AI 候选生成 ============================ */
function genMoves(hand,level){
  const moves=[], byRank={}, jokers=[], rankCards={};
  hand.forEach(c=>{
    if(c.joker) jokers.push(c);
    else { (byRank[c.rank]=byRank[c.rank]||[]).push(c); (rankCards[c.rank]=rankCards[c.rank]||[]).push(c); }
  });
  hand.forEach(c=>moves.push([c]));                       // 单张
  for(const r in byRank){ const g=byRank[r];
    if(g.length>=2) moves.push(g.slice(0,2));
    if(g.length>=3) moves.push(g.slice(0,3));
    if(g.length>=4) moves.push(g.slice());                // 炸弹
  }
  const sj=jokers.filter(c=>c.joker==='S'), bj=jokers.filter(c=>c.joker==='B');
  if(sj.length>=2) moves.push(sj.slice(0,2));
  if(bj.length>=2) moves.push(bj.slice(0,2));
  if(sj.length>=2&&bj.length>=2) moves.push([...sj.slice(0,2),...bj.slice(0,2)]);
  for(const r in byRank) if(byRank[r].length>=3)          // 三带二
    for(const r2 in byRank) if(r2!==r&&byRank[r2].length>=2)
      moves.push([...byRank[r].slice(0,3),...byRank[r2].slice(0,2)]);
  const seq=(g,nr)=>{ for(let s=1;s<=15-nr;s++){ const sel=[]; let ok=true;
    for(let i=0;i<nr;i++){ let r=s+i, ar=(r===1)?14:r; const cs=rankCards[ar]||[];
      if(cs.length<g){ok=false;break;} for(let k=0;k<g;k++) sel.push(cs[k]); }
    if(ok) moves.push(sel); } };
  seq(1,5); seq(2,3); seq(3,2);                            // 顺子 / 三连对 / 钢板
  return moves;
}

/* ============================ 游戏状态 ============================ */
const NAMES=['你','左家','对家','右家'];
let players=[], currentLevel=2, teamLevels=[2,2];
let currentPlayer=0, lastPlay=null, passed=new Set(), finishedOrder=[], gameOver=false;
let selected=new Set();
let prevOrder=null;                          // 上一局名次(idx数组)，决定进贡
let pendingReturns=[], retIndex=0, returnMode=null, tributeLead=0, tributeMsgs=[];
const team=i=>i%2;
function cardName(c){ return c.joker?rankText(c):rankText(c)+SUIT_SYM[c.suit]; }

function newGame(){
  teamLevels=[2,2]; currentLevel=2; gameOver=false; prevOrder=null;
  startDeal();
}
function startDeal(){
  const deck=shuffle(makeDeck());
  players=[0,1,2,3].map(i=>({idx:i,hand:[],finished:false,lastShown:null}));
  deck.forEach((c,i)=>players[i%4].hand.push(c));
  players.forEach(p=>sortHand(p.hand));
  lastPlay=null; passed.clear(); finishedOrder=[]; selected.clear();
  returnMode=null; pendingReturns=[]; retIndex=0; tributeMsgs=[];
  log('新一局开始，级牌 '+valueName(currentLevel));
  if(!prevOrder){ currentPlayer=0; renderAll(); step(); }   // 首局无进贡
  else runTribute();
}

/* ---------- 进贡 / 还贡 ---------- */
function runTribute(){
  const order=prevOrder, winT=team(order[0]);
  const dbl=team(order[1])===winT;                          // 双下=头游+二游同队
  const pairs=dbl ? [{p:order[3],r:order[0]},{p:order[2],r:order[1]}]
                  : [{p:order[3],r:order[0]}];
  const bigJokers=pairs.reduce((s,x)=>s+players[x.p].hand.filter(c=>c.joker==='B').length,0);
  if(bigJokers>=2){                                          // 抗贡
    showTributeInfo(['抗贡！进贡方持有两张大王，本局免进贡'],()=>finishTribute(order[0]));
    return;
  }
  tributeMsgs=[]; const info=[];
  for(const x of pairs){
    const ph=players[x.p].hand;
    const card=ph.filter(c=>!isWild(c,currentLevel)).sort((a,b)=>rvCard(b,currentLevel)-rvCard(a,currentLevel))[0];
    players[x.p].hand=ph.filter(c=>c.id!==card.id);
    players[x.r].hand.push(card);
    info.push({payer:x.p,receiver:x.r,card});
    tributeMsgs.push(`${NAMES[x.p]} 进贡 ${cardName(card)} 给 ${NAMES[x.r]}`);
  }
  tributeLead = info.length===2
    ? (rvCard(info[0].card,currentLevel)>=rvCard(info[1].card,currentLevel)?info[0]:info[1]).payer
    : info[0].payer;                                         // 进贡最大者先出
  pendingReturns=info.map(t=>({payer:t.payer,receiver:t.receiver}));
  retIndex=0; processReturns();
}
function processReturns(){
  while(retIndex<pendingReturns.length){
    const pr=pendingReturns[retIndex];
    if(pr.receiver===0){                                     // 轮到你还贡
      returnMode=pr; renderAll(); updateButtons();
      log(`请选一张不大于10的牌还贡给 ${NAMES[pr.payer]}，再按「出牌」`);
      return;
    }
    autoReturn(pr); retIndex++;
  }
  finalizeTribute();
}
function autoReturn(pr){
  const h=players[pr.receiver].hand;
  let cand=h.filter(c=>!c.joker && !isWild(c,currentLevel) && c.rank<=10);
  if(!cand.length) cand=h.filter(c=>!isWild(c,currentLevel));
  if(!cand.length) cand=h.slice();
  const card=cand.sort((a,b)=>rvCard(a,currentLevel)-rvCard(b,currentLevel))[0];
  players[pr.receiver].hand=h.filter(c=>c.id!==card.id);
  players[pr.payer].hand.push(card);
  tributeMsgs.push(`${NAMES[pr.receiver]} 还贡 ${cardName(card)} 给 ${NAMES[pr.payer]}`);
}
function finalizeTribute(){
  returnMode=null; players.forEach(p=>sortHand(p.hand));
  showTributeInfo(tributeMsgs,()=>finishTribute(tributeLead));
}
function finishTribute(leader){
  lastPlay=null; passed.clear(); players.forEach(p=>p.lastShown=null);
  currentPlayer=leader; renderAll(); step();
}
function showTributeInfo(lines,cb){ showOverlay('进贡 · 还贡', lines.join('<br>')||'无', cb, '开始出牌'); }
function sortHand(h){ h.sort((a,b)=>rvCard(b,currentLevel)-rvCard(a,currentLevel) || SUITS.indexOf(a.suit)-SUITS.indexOf(b.suit)); }
function nextActive(i){ let j=(i+1)%4; let g=0; while(players[j].finished && g<4){ j=(j+1)%4; g++; } return j; }

function step(){
  if(gameOver) return;
  const active=players.filter(p=>!p.finished);
  if(active.length<=1){ if(active.length===1){ active[0].finished=true; finishedOrder.push(active[0]); } endDeal(); return; }
  if(players[currentPlayer].finished){ currentPlayer=nextActive(currentPlayer); return step(); }
  if(currentPlayer===0){ renderAll(); updateButtons(); return; }
  renderAll(); updateButtons();
  setTimeout(()=>{
    const mv=aiMove(currentPlayer);
    if(mv) applyPlay(currentPlayer,mv.cards,mv.desc); else applyPass(currentPlayer);
    afterAction();
  },650);
}
function afterAction(){
  if(gameOver) return;
  if(lastPlay){
    const others=players.filter(p=>!p.finished && p.idx!==lastPlay.player);
    if(others.every(p=>passed.has(p.idx))){
      let leader=lastPlay.player;
      if(players[leader].finished) leader=nextActive(leader);
      lastPlay=null; passed.clear(); players.forEach(p=>p.lastShown=null);
      currentPlayer=leader; renderAll(); return step();
    }
  }
  currentPlayer=nextActive(currentPlayer); renderAll(); step();
}
function applyPlay(idx,cards,desc){
  const p=players[idx]; const ids=new Set(cards.map(c=>c.id));
  p.hand=p.hand.filter(c=>!ids.has(c.id));
  lastPlay={player:idx,desc,cards:cards.slice()};
  passed.clear(); players.forEach(q=>{ if(q.idx!==idx) q.lastShown=null; });
  p.lastShown=cards.slice();
  log(NAMES[idx]+' 出 '+descText(desc));
  if(p.hand.length===0){ p.finished=true; finishedOrder.push(p); log('🎉 '+NAMES[idx]+' 出完!'); }
}
function applyPass(idx){ passed.add(idx); players[idx].lastShown='pass'; log(NAMES[idx]+' 不出'); }

function bombCardIds(hand){                       // 属于炸弹的牌(不可拆)
  const ids=new Set(), byRank={}, jk={S:[],B:[]};
  hand.forEach(c=>{ if(c.joker)jk[c.joker].push(c); else (byRank[c.rank]=byRank[c.rank]||[]).push(c); });
  for(const r in byRank) if(byRank[r].length>=4) byRank[r].forEach(c=>ids.add(c.id));
  if(jk.S.length>=2&&jk.B.length>=2) jk.S.concat(jk.B).forEach(c=>ids.add(c.id));
  return ids;
}
function breakage(cards,hand){                    // 拆牌惩罚: 拆散对子/三条留下零头
  const cnt={}; hand.forEach(c=>{const k=c.joker||('r'+c.rank); cnt[k]=(cnt[k]||0)+1;});
  const used={}; cards.forEach(c=>{const k=c.joker||('r'+c.rank); used[k]=(used[k]||0)+1;});
  let pen=0; for(const k in used) if(used[k]<cnt[k]) pen+=cnt[k]-used[k];
  return pen;
}
function aiMove(idx){
  const hand=players[idx].hand, req=lastPlay?lastPlay.desc:null, lvl=currentLevel;
  const bombIds=bombCardIds(hand), cand=[];
  for(const m of genMoves(hand,lvl)){
    const d=choosePlay(evaluateSelection(m,lvl),null); if(!d) continue;
    cand.push({cards:m,desc:d,bk:breakage(m,hand),
      breaksBomb:d.category!=='bomb'&&m.some(c=>bombIds.has(c.id))});
  }
  const beats=cand.filter(c=>compareBeat(c.desc,req));
  const goOut=p=>p.filter(c=>c.cards.length===hand.length).sort((a,b)=>a.desc.value-b.desc.value)[0];

  // 队友正压着这墩 → 配合，不抢自家人(除非能一手走完)
  if(req && lastPlay.player!==idx && team(lastPlay.player)===team(idx)){
    return goOut(beats) || null;
  }

  if(!req){                                       // 自由出牌
    let pool=beats.filter(c=>c.desc.category==='normal'&&!c.breaksBomb);
    if(!pool.length) pool=beats.filter(c=>c.desc.category==='normal');
    if(!pool.length) pool=beats;
    const out=goOut(pool); if(out) return out;
    pool.sort((a,b)=>a.bk-b.bk || a.desc.value-b.desc.value || b.cards.length-a.cards.length);
    return pool[0];
  }

  // 压对手: 优先不拆炸/不拆牌、用最小的牌压
  const norm=beats.filter(c=>c.desc.category==='normal');
  const nb=norm.filter(c=>!c.breaksBomb), pool=nb.length?nb:norm;
  if(pool.length){
    const out=goOut(pool); if(out) return out;
    pool.sort((a,b)=>a.desc.value-b.desc.value || a.bk-b.bk || a.cards.length-b.cards.length);
    return pool[0];
  }
  // 只能动炸弹
  const bombs=beats.filter(c=>c.desc.category==='bomb').sort((a,b)=>a.desc.strength-b.desc.strength);
  if(bombs.length){
    const oppLow=players.some(q=>!q.finished&&team(q.idx)!==team(idx)&&q.hand.length<=4);
    if(oppLow || hand.length<=bombs[0].cards.length) return bombs[0];
  }
  return null;
}

function endDeal(){
  const order=finishedOrder.map(p=>p.idx);
  const winner=order[0], winTeam=team(winner);
  const partner=(winner+2)%4;
  const pRank=order.indexOf(partner);                 // 0-based 名次
  const gain=[0,3,2,1][pRank];                          // 头游+队友(二游/三游/四游)
  let title, body;
  const me=team(0)===winTeam;
  const newLevel=teamLevels[winTeam]+gain;
  body=`名次：${order.map((i,n)=>(n+1)+'.'+NAMES[i]).join('  ')}<br>`+
       `<b>${winTeam===0?'你方':'对方'}</b> 头游，升 ${gain} 级`;
  if(teamLevels[winTeam]>=14 && gain>0){
    gameOver=true;
    title=me?'🏆 你方过了 A，获胜！':'😵 对方过了 A，你方失败';
    showOverlay(title,body,()=>newGame(),'再来一局');
    return;
  }
  teamLevels[winTeam]=Math.min(14,newLevel);
  currentLevel=teamLevels[winTeam];
  title=(me?'本局你方头游':'本局对方头游')+' — 级牌升至 '+valueName(currentLevel);
  showOverlay(title,body,()=>{ prevOrder=order; startDeal(); },'下一局');
}

/* ============================ 人类操作 ============================ */
function onPlay(){
  if(returnMode){                                  // 还贡模式
    const sel=players[0].hand.filter(c=>selected.has(c.id));
    if(sel.length!==1){ flash('请选一张牌还贡'); return; }
    const card=sel[0];
    if(card.joker||isWild(card,currentLevel)||card.rank>10){ flash('还贡必须是一张不大于10的牌'); return; }
    selected.clear();
    const pr=returnMode; const h=players[pr.receiver].hand;
    players[pr.receiver].hand=h.filter(c=>c.id!==card.id);
    players[pr.payer].hand.push(card);
    tributeMsgs.push(`你 还贡 ${cardName(card)} 给 ${NAMES[pr.payer]}`);
    returnMode=null; retIndex++; processReturns();
    return;
  }
  if(currentPlayer!==0||gameOver) return;
  const sel=players[0].hand.filter(c=>selected.has(c.id));
  if(!sel.length){ flash('请选择要出的牌'); return; }
  const d=choosePlay(evaluateSelection(sel,currentLevel), lastPlay?lastPlay.desc:null);
  if(!d){ flash(lastPlay?'打不过上家 / 不是合法牌型':'不是合法牌型'); return; }
  selected.clear();
  applyPlay(0,sel,d);
  afterAction();
}
function onPass(){
  if(currentPlayer!==0||gameOver||!lastPlay) return;
  selected.clear(); applyPass(0); afterAction();
}
function onHint(){
  if(currentPlayer!==0) return;
  const req=lastPlay?lastPlay.desc:null;
  const cand=[];
  for(const m of genMoves(players[0].hand,currentLevel)){
    const d=choosePlay(evaluateSelection(m,currentLevel),null);
    if(d && compareBeat(d,req)) cand.push({cards:m,desc:d});
  }
  if(!cand.length){ flash('没有能出的牌，建议「不出」'); return; }
  const norm=cand.filter(c=>c.desc.category==='normal'); const pool=norm.length?norm:cand;
  pool.sort((a,b)=>(a.desc.value-b.desc.value)||(a.cards.length-b.cards.length));
  selected=new Set(pool[0].cards.map(c=>c.id));
  renderHand();
}
function toggleCard(id){
  if((currentPlayer!==0&&!returnMode)||gameOver) return;
  if(selected.has(id)) selected.delete(id); else selected.add(id);
  renderHand();
}

/* ============================ 渲染 ============================ */
function cardEl(c,cls){
  const d=document.createElement('div');
  d.className='card '+(cls||'')+((c.joker||RED.has(c.suit))?' red':'')+(isWild(c,currentLevel)?' wild':'');
  if(c.joker){ d.innerHTML=`<div class="r">${c.joker==='B'?'大':'小'}</div><div class="s">王</div>`; }
  else d.innerHTML=`<div class="r">${rankText(c)}</div><div class="s">${SUIT_SYM[c.suit]}</div>`;
  return d;
}
function backEl(){ const d=document.createElement('div'); d.className='card mini back'; return d; }

function renderSeat(i){
  const seat=document.getElementById('seat'+i), p=players[i];
  seat.classList.toggle('turn', currentPlayer===i && !gameOver);
  if(i!==0){
    seat.querySelector('.count').textContent='剩 '+p.hand.length+' 张'+(p.finished?' ✔':'');
  }
  const pl=seat.querySelector('.played'); pl.innerHTML='';
  if(p.lastShown==='pass'){ const s=document.createElement('div'); s.className='pass'; s.textContent='不出'; pl.appendChild(s); }
  else if(Array.isArray(p.lastShown)){ p.lastShown.forEach(c=>pl.appendChild(cardEl(c,'mini'))); }
}
function renderHand(){
  const h=document.getElementById('hand'); h.innerHTML='';
  players[0].hand.forEach(c=>{
    const el=cardEl(c); if(selected.has(c.id)) el.classList.add('sel');
    el.onclick=()=>toggleCard(c.id);
    h.appendChild(el);
  });
}
function renderAll(){
  [1,2,3].forEach(renderSeat);
  // 你的出牌也显示在底部上方
  const seat0=document.getElementById('seat0'); seat0.style.display=Array.isArray(players[0].lastShown)?'block':(players[0].lastShown==='pass'?'block':'none');
  const pl=seat0.querySelector('.played'); pl.innerHTML='';
  if(players[0].lastShown==='pass'){ const s=document.createElement('div'); s.className='pass'; s.textContent='不出'; pl.appendChild(s); }
  else if(Array.isArray(players[0].lastShown)) players[0].lastShown.forEach(c=>pl.appendChild(cardEl(c,'mini')));
  renderHand();
  document.getElementById('status').innerHTML=
    `级牌(主牌)：<b>${valueName(currentLevel)}</b><br>`+
    `你方等级：<b>${valueName(teamLevels[0])}</b>　对方：<b>${valueName(teamLevels[1])}</b><br>`+
    `当前：<b>${NAMES[currentPlayer]}</b>${lastPlay?'　需压：'+descText(lastPlay.desc):'　(自由出牌)'}`;
}
function updateButtons(){
  if(returnMode){
    document.getElementById('btnPlay').disabled=false;
    document.getElementById('btnPass').disabled=true;
    document.getElementById('btnHint').disabled=true;
    return;
  }
  const my=currentPlayer===0 && !gameOver;
  document.getElementById('btnPlay').disabled=!my;
  document.getElementById('btnPass').disabled=!my||!lastPlay;
  document.getElementById('btnHint').disabled=!my;
}
let logs=[];
function log(t){ logs.unshift(t); logs=logs.slice(0,8); document.getElementById('log').innerHTML=logs.join('<br>'); }
function flash(t){ log('⚠ '+t); }
function showOverlay(title,body,cb,btn){
  document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovBody').innerHTML=body;
  const o=document.getElementById('overlay'); o.style.display='flex';
  const b=document.getElementById('ovBtn'); b.textContent=btn||'继续';
  b.onclick=()=>{ o.style.display='none'; cb(); };
}

/* ============================ 绑定 & 启动 ============================ */
document.getElementById('btnPlay').onclick=onPlay;
document.getElementById('btnPass').onclick=onPass;
document.getElementById('btnHint').onclick=onHint;
document.getElementById('btnSort').onclick=()=>{ sortHand(players[0].hand); renderHand(); };
document.getElementById('btnHelp').onclick=()=>window.open('help.html','_blank');
newGame();
</script>
